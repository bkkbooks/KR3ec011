body:
  text: 卷之二東垣先生用藥心法隨證治病藥品如頭痛須用川芎如不愈各加引經藥太陽川芎陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸如頂巔痛須用藁本去川芎如肢節痛須用羌活去風濕亦宜用之如腹痛須用芍藥惡寒而痛加桂惡熱而痛加黃柏如心下痞須用枳實黃連如肌熱及去痰者須用黃芩肌熱亦用黃耆如腹脹用薑製厚朴一本有芍藥如虛熱須用黃耆止虛汗亦用如脅下痛往來潮熱日晡潮熱須用柴胡如脾胃受濕沉困無力怠惰好臥去痰用白朮如破滯氣用枳殼高者用之夫枳殼者損胸中至高之氣二三服而已如破滯血用桃仁蘇木如去痰須用半夏熱痰加黃芩風痰加南星胸中寒痰痞塞用陳皮白朮多用則瀉脾胃如腹中窄狹須用蒼朮如調氣須用木香如補氣須用人參如和血須用當歸凡血受病者皆當用當歸也如去下焦濕腫及痛並膀胱有火邪者必須酒洗防己草龍膽黃柏知母如去上焦濕及熱須用黃芩瀉肺火故也如去中焦濕與痛熱用黃連能瀉心火故也如去滯氣用青皮勿多服多則瀉人真氣如渴者用乾葛茯苓禁半夏如嗽者用五味子如喘者用阿膠如宿食不消須用黃連枳實如胸中煩熱須用梔子仁如水瀉須用白朮茯苓芍藥如氣刺痛用枳殼看何部分以引經藥導使之行則可如血刺痛用當歸詳上下用根梢如瘡痛不可忍者用寒苦藥如黃柏黃芩詳上下用根梢及引經藥則可如眼痛不可忍者用黃連當歸身以酒浸煎如小便黃者用黃柏數者澀者或加澤瀉如腹中實熱用大黃芒硝如小腹痛用青皮如莖中痛用生甘草梢如驚悸恍惚用茯神如飲水多致傷脾用白朮茯苓豬苓如胃脘痛用草豆蔻凡用純寒純熱藥必用甘草以緩其力也寒熱相雜亦用甘草調和其性也中滿者禁用經云中滿者勿食甘用藥凡例凡解利傷風以防風為君甘草白朮為佐經云辛甘發散為陽風宜辛散防風味辛及治風通用故防風為君甘草白朮為佐凡解利傷寒以甘草為君防風白朮為佐是寒宜甘發也或有別證於前隨證治病藥內選用分兩以君臣論凡眼暴發赤腫以防風黃芩為君以瀉火以黃連當歸身和血為佐兼以各經藥用之凡眼久病昏暗以熟地黃當歸身為君以羌活防風為臣甘草甘菊之類為佐凡痢疾腹痛以白芍藥甘草為君當歸白朮為佐下血先後以三焦熱論凡水瀉以茯苓白朮為君芍藥甘草為佐凡諸風以防風為君隨治病為佐凡嗽以五味子為君有痰者以半夏為佐喘者以阿膠為佐有熱無熱以黃芩為佐但分兩多寡不同耳凡小便不利黃柏知母為君茯苓澤瀉為佐凡下焦有濕草龍膽防己為君甘草黃柏為佐凡痔漏以蒼朮防風為君甘草芍藥為佐詳別證加減凡諸瘡以黃連當歸為君甘草黃芩為佐凡瘧以柴胡為君隨所發時所屬經分用引經藥佐之以上皆用藥之大要更詳別證於前隨證治病藥內逐旋加減用之東垣報使太陽羌活下黃柏陽明白芷升麻下石膏少陽上柴胡下青皮太陰白芍藥少陰知母厥陰青皮上柴胡小腸膀胱屬太陽藁本羌活是本方三焦膽與肝包絡少陽厥陰柴胡強陽明大腸兼足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺經異升麻芍藥白者詳少陰心經獨活主腎經獨活加桂良通經用此藥為使更有何病到膏肓諸經嚮導制方之法夫藥有寒熱溫涼之性酸苦辛鹹甘淡之味各有所能不可不通也藥之氣味不比同時之物味皆咸其氣皆寒之類是也凡同氣之物必有諸味同味之物必有諸氣互相氣味各有厚薄性用不等制其方者必且明其為用經曰味為陰味厚為純陰味薄為陰中之陽氣為陽氣厚為純陽氣薄為陽中之陰然味厚則泄薄則通氣薄則發泄厚則發熱又曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽凡此之味各有所能然辛能散結潤燥苦能燥濕堅軟咸能軟堅酸能收緩收散甘能緩急淡能利竅故經曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之開腠理致津液通其氣也肝欲散急食辛以散之心欲軟急食鹹以軟之脾欲緩急食甘以緩之肺欲收急食酸以收之腎欲堅急食苦以堅之凡此者是明其氣味之用也若用其味必明其氣之可否用其氣必明其味之所宜識其病之標本臟腑寒熱虛實微甚緩急而用其藥之氣味隨其證而制其方也是故方有君臣佐使輕重緩急大小反正逆從之制也主治病者為君佐君者為臣應臣者為使用此隨病之所宜而又贊成方而用之君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也去咽嗌近者奇之遠者偶之汗者不奇下者不偶補上治上制之以緩補下治下制之以急急者氣味厚也緩者氣味薄也薄者少服而頻食厚者多服而頓食又當明五氣之郁木鬱達之謂吐令條達也火鬱發之謂汗令疏散也土鬱奪之謂下令無壅滯也金鬱泄之謂解表利小便也水鬱折之謂制其沖逆也通此五法乃治病之大要也用藥各定分兩為君者最多為臣者次之佐者又次之藥之於證所主同者則等分用藥酒洗曝乾黃芩黃連黃柏知母病在頭面及手梢皮膚者須用酒炒之借酒力以上騰也咽之下臍之上須酒洗之在下生用大凡生升熟降大黃鬚煨恐寒則損胃氣至於川烏附子須炮以製毒也黃柏知母下部藥也久弱之人須合用之者酒浸曝乾恐寒傷胃氣也熟地黃酒洗亦然當歸酒浸曝發散之意也用藥根梢身例凡根之在土者中半以上氣脈之上行也以生苗者為根中半以下氣脈之下行也入土以為梢病在中焦與上焦者用根在下焦者用梢根升而梢降大凡藥根有上中下人身半以上天之陽也用頭在中焦用身在身半以下地之陰也用梢述類象形者也用丸散藥例仲景言銼如麻豆大與㕮咀同意夫㕮咀古之制也古者無鐵刃以口咬細令如麻豆為粗藥煎之使藥水清飲於腹中則易升易散也此所謂㕮咀也今人以刀器銼如麻豆大此㕮咀之易成也若一概為細末不分清濁矣經云清陽發腠理濁陰走五臟果何謂也又曰清陽實四肢濁陰歸六腑㕮咀之藥取汁易行經絡也若治至高之病加酒煎去濕以生薑補元氣以大棗發散風寒以蔥白去膈上痰以蜜細末者不循經絡止去胃中及臟腑之積氣味厚者白湯調氣味薄者煎之和渣服去下部之疾其丸極大而光且圓治中焦者次之治上焦者極小稠麵糊取其遲化直至下焦或酒或醋取其收其散之意也犯半夏南星欲去濕者以生薑汁稀糊為丸取其易化也水浸宿炊餅又易化滴水丸又易化煉蜜丸者取其遲化而氣循經絡也蠟丸者取其難化而旋旋取效也大抵湯者蕩也去大病用之散者散也去急病用之丸者緩也不能速去之其用藥之舒緩而治之意也升合分兩古之方劑錙銖分兩與今不同謂如㕮咀者即今銼如麻豆大是也云一升者即今之大白盞也云銖者六銖為一分即二錢半也二十四銖為一兩也云三兩者即今之一兩云二兩即今之六錢半也料例大者只合三分之一足矣君臣佐使法帝曰方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也帝曰三品何謂曰所以明善惡之殊貫也凡藥之所用者皆以氣味為主補瀉在味隨時換氣主病者為君假令治風者防風為君治上焦熱黃芩為君治中焦熱黃連為君治濕防己為君治寒附子之類為君兼見何證以佐使藥分治之此制方之要也本草説上品藥為君各從其宜也治法綱要氣交變論云夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣失常之理則天地四時之氣無所運行故動必有靜勝必有復乃天地陰陽之道也假令高者抑之非高者固當抑也以其本下而失之太高故抑之而使下若本高何抑之有假令下者舉之非下者固當舉之也以其本高而失之太下故舉而使之高若本下何舉之有如仲景治表虛制桂枝湯方桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草為佐陽脈澀陰脈弦法當腹中急痛制小建中湯方芍藥味酸寒主收補中本乎地者親下故芍藥為君桂甘草佐之一則治表虛一則治裡虛各言其主用也後之用古方者觸類而長之不致差誤矣藥味專精至元庚辰六月許伯威年五十四中氣本弱病傷寒八九日醫者見其熱甚以涼藥下之又食梨三四枚痛傷脾胃四肢冷時發昏憒豫診其脈動而中止有時自還乃結脈也心亦悸動吃噫不絶色變青黃精神減少目不欲開倦臥惡人語笑以炙甘草湯治之成無己云補可去弱人參大棗之甘以補不足之氣桂枝生薑之辛以益正氣五臟痿弱榮衛涸流濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心是也加以人參桂枝急扶正氣生地黃減半恐傷陽氣銼一兩劑服之不效豫再候之脈證相對莫非藥有陳腐者致不效乎再市藥之氣味厚者煎服其證減半再服而安凡藥之昆蟲草木産之有地根葉花實採之有時失其地則性味少異矣失其時則性味不全矣又況新陳之不同精粗之不等倘不擇而用之其不效者醫之過也內經曰司歲備物氣味之精專也修合之際宜加謹焉湯液煎造病人服藥必擇人煎藥能識煎熬製度須令親信恭誠至意者煎藥銚器除油垢腥穢必用新淨甜水為上量水大小斟酌以慢火煎熬分數用紗濾去渣取清汁服之無不效也古人服藥活法在上不厭頻而少在下不厭頓而多少服則滋榮於上多服則峻補於下古人服藥有法病在心上者先食而後藥病在心下者先藥而後食病在四肢者宜飢食而在旦病在骨髓者宜飽食而在夜察病輕重凡欲療病先察其源先候其機五臟未虛六腑未竭血脈未亂精神未散服藥必效若病已成可得半愈病勢已過命將難存自非明醫聽聲察色至於診脈孰能知未病之病乎海藏老人湯液本草五宜肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸肺色白宜食苦小麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或軟四時五臟病隨五味所宜也大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也蓋陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命五傷多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落五走咸走血血病毋多食鹹苦走骨骨病毋多食苦辛走氣氣病毋多食辛酸走筋筋病毋多食酸甘走肉肉病毋多食甘夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也服藥可慎熱中消中不可服膏粱芳草石藥夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此夫熱氣剽悍藥氣亦然二氣相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論論藥所主海藏云湯液要藥最為的當其餘方論所著雜例比之湯液稍異何哉蓋伊尹仲景取其治之長也其所長者神農之所注也何以知之本草云一物主十病取其偏長為本又當取潔古珍珠囊斷例為準則其中藥之所主不必多言只一兩句多則不過三四句非務簡也亦取其所主之偏長故不為多也天地生物有厚薄堪用不堪用故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也謹候氣宜無失病機其主病何如言採藥之歲也司歲備物則無遺主矣先歲物何也天地之專精也專精之氣藥物肥濃又於使用當其正氣味也五運主歲不足則物薄有餘則物精非專精則散氣散氣則物不純是以質同而異等形質雖同力用則異也氣味有厚薄性用有躁靜治化有多少力化有淺深此之謂也氣味生成流布陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰中之陽厚則泄薄則通氣厚者為陽薄為陽中之陰薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣神和而生津液相成神乃自生七方大君一臣三佐九制之大也遠而奇偶制大其服也大則數少少則二之腎肝位遠服湯散不厭頓而多小君一臣二制之小也近而奇偶制小其服也小則數多多則九之心肺位近服湯散不厭頻而少緩補上治上制以緩緩則氣味薄治主以緩緩則治其本急補下治下制以急急則氣味厚治客以急急則治其標奇君一臣二奇之制也君二臣三奇之制也陽數奇偶君二臣四偶之制也君二臣六偶之制也陰數偶復奇之不去則偶之是為重方也十劑宣可以去壅薑橘之屬是也通可以去滯木通防己之屬是也補可以去弱人參羊肉之屬是也瀉可以去閉葶藶大黃之屬是也輕可以去實麻黃葛根之屬是也重可以去怯磁石鐵漿之屬是也滑可以去著冬葵子榆白皮之屬是也澀可以去脫牡蠣龍骨之屬是也燥可以去濕桑白皮赤小豆之屬是也濕可以去枯白石英紫石英之屬是也只如此體皆有所屬凡用藥者審而詳之則靡所失矣陶隱居云藥有宣通補瀉輕重滑澀燥濕此十劑今詳之惟寒熱二種何獨見遺今補二種以盡厥旨寒可以去熱大黃朴硝之屬是也熱可以去寒附子官桂之屬是也
