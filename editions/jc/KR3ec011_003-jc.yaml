body:
  text: 卷之三草部防風純陽性溫味甘辛無毒足陽明胃經足太陰脾經乃二經行經之藥太陽經本經藥象云治風通用瀉肺實散頭目中滯氣除上焦風邪之仙藥也誤服瀉人上焦元氣去蘆並釵股用珍云身去身半以上風邪梢去身半以下風邪心云又去濕之仙藥也風能勝濕爾本草云主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿脅痛脅風頭面遊風去來四肢攣急字乳金瘡內痙東垣云防風能制黃耆黃耆得防風其功愈大又云防風乃卒伍卑賤之職隨所引而至乃風藥末潤劑也雖與黃耆相制乃相畏而相使者也本草又云得澤瀉藁本療風得當歸芍藥陽起石禹餘糧療婦人子臟風殺附子毒惡乾薑藜蘆白蘞芫花升麻氣平味苦甘微苦微寒味薄氣厚陽中之陰也無毒陽明經本經藥亦走手陽明經太陰經象云能解肌肉間熱此手足陽明經傷風之的藥也去黑皮及腐爛者用若補脾胃非此為引用不能補若得蔥白白芷之類亦能走手足陽明太陰心云發散本經風邪元氣不足者用此於陰中升陽氣上行珍云脾痹非此不能除本草云主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡東垣云升麻入足陽明若初病太陽證便服升麻葛根發出陽明經汗或失之過陽明經燥太陽經不可解必傳陽明矣投湯不當非徒無益而又害之也朱氏云瘀血入里若衄血吐血者犀角地黃湯乃陽明經聖藥也如無犀角以升麻代之升麻犀角性味相遠不同何以代之蓋以升麻止是引地黃及余藥同入陽明耳仲景云太陽病若發汗若利小便重亡津液胃中乾燥因轉屬陽明其害不可勝言又云太陽几几無汗者葛根湯發之若几几自汗者表虛也不宜用此朱氏用升麻者以表實無汗也訣云主肺痿咳唾膿血能發浮汗羌活氣微溫味苦甘平苦辛氣味俱輕陽也無毒足太陽經厥陰經藥太陽經本經藥也象云治肢節痛利諸節手足太陽經風藥也加川芎治足太陽少陰頭痛透關節去黑皮並腐爛者用心云去溫濕風珍云骨節痛非此不能除液云君藥也非無為之主乃卻亂反正之主太陽經頭痛肢節痛一身盡痛非此不治又云羌治足太陽厥陰少陰藥也與獨活不分二種後人用羌活多用鞭節者用獨活多用鬼眼者羌活則氣雄獨活則氣細故雄者入足太陽細者入足少陰也又錢氏瀉青丸用此壬乙同歸一治也或問治頭痛者何答曰巨陽從頭走足惟厥陰與督脈會於巔逆而上行諸陽不得下故令頭痛也獨活氣味與羌活同無毒氣厚味薄升也苦辛足少陰腎經行經之藥本草云主風寒所擊金瘡止痛賁豚癇痓女子疝瘕療諸賊風百節痛風無久新者液云獨活細而低治足少陰伏風而不治太陽故兩足寒濕痹不能動止非此不能治象云若與細辛同用治少陰經頭痛一名獨搖草得風不搖無風自搖去皮淨用心云治風須用又能燥濕經云風能勝濕珍云頭眩目暈非此不能除柴胡氣平味微苦微寒氣味俱輕陽也升也純陽無毒少陽經厥陰經行經之藥象云除虛勞寒熱解肌熱去早晨潮熱婦人產前後必用之藥善除本經頭痛非他藥能止治心下痞胸膈痛去蘆用心云少陽經分之藥引胃氣上升苦寒以發表熱珍云去往來寒熱膽癉非此不能除本草云主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪氣五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯久服輕身明目益精半夏為之使惡皂莢畏女菀藜蘆入足少陽主東方分也在經主氣在臟主血證前行則惡熱卻退則惡寒雖氣之微寒味之薄者故能行經若佐以三稜廣朮巴豆之類故能消堅積是主血也婦人經水適來適斷傷寒雜病易老俱用小柴胡湯主之加以四物之類並秦艽牡丹皮輩同為調經之劑衍義云柴胡本經並無一字治勞今人治勞方中鮮有不用者凡此誤世甚多嘗原病勞有一種真臟虛損復受邪熱因虛而致勞故曰勞者牢也須當斟酌用之如經驗方治勞熱青蒿煎丸用柴胡正合宜耳服之無不效日華子云味甘補五勞七傷除煩止驚益氣力藥性論亦謂治勞乏羸瘦若此等病苟無實熱醫者取而用之不亡何待註釋本草一字亦不可忽蓋後世所誤無窮也苟有明哲之士自可處制中下之士不肯考究枉致淪沒可不謹哉可不戒哉如張仲景治寒熱往來如瘧用柴胡正合其宜圖經云治傷寒有大小柴胡湯柴胡加龍骨牡蠣柴胡加芒硝等湯故後人治傷寒熱此為最要之藥東垣云能引清氣而行陽道傷寒外諸藥所加有熱則加之無熱則不加又能引胃氣上行升騰而行春令是也欲其如此又何加之海藏云能去臟腑內外俱乏既能引清氣上行而順陽道又入足少陽蓋以少陽之氣初出地之皮為嫩陽故以少陽當之葛根氣平味甘無毒陽明經引經藥足陽明經行經的藥象云治脾虛而渴除胃熱解酒毒通行足陽明經之藥去皮用心云止渴升陽珍云益陽生津勿多用恐傷胃氣虛渴者非此不能除本草云主消渴身大熱嘔吐諸痹起陰氣解諸毒療傷寒中風頭痛解肌發表出汗開腠理療金瘡止痛脅風痛生根汁寒治消渴傷寒壯熱花主消酒粉味甘大寒主壓丹石去煩熱利大小便止渴小兒熱禿以葛根浸搗汁飲之良東垣云葛根甘平溫世人初病太陽證便服葛根升麻湯非也朱奉議云頭痛如欲破者連須蔥白湯飲之又不已者葛根蔥白湯易老云用此以斷太陽入陽明之路非即太陽藥也故仲景治太陽陽明合病桂枝湯內加麻黃葛根也又有葛根黃芩黃連解肌湯是知葛根非太陽藥即陽明藥食療云葛根蒸食之消毒其粉亦甚妙其粉以水調三合能解鴆毒衍義云治中熱酒渴病多食行小便亦能使人利病酒及渴者得之甚良易老又云太陽初病未入陽明頭痛者不可便服葛根發之若服之是引賊破家也若頭顱痛者可服之葛根湯陽明自中風之仙藥也本草又云殺野葛巴豆百藥毒威靈仙氣溫味苦甘純陽象云主諸風濕冷通五臟去腹內瘕滯腰膝冷痛及治傷損鐵腳者佳去蘆用心云去大腸之風本草云忌茗細辛氣溫味大辛純陽性溫氣厚於味陽也無毒少陰經藥手少陰引經之藥象云治少陰頭痛如神當少用之獨活為使為主用去頭蘆並葉華州者佳珍云主少陰經頭痛心云主諸項頭痛諸風通用之味辛熱溫陰經散水寒以去內寒本草云主咳逆頭痛腦動百節拘攣風濕痹痛死肌溫中下氣破痰利水道開胸中除喉痹齆鼻風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣久服明目利九竅東垣云治邪在裡之表故仲景少陰證用麻黃附子細辛湯也易老云治少陰頭痛太陽則羌活少陰則細辛陽明則白芷厥陰則川芎吳茱萸少陽則柴胡用者隨經不可差細辛香味俱緩故入少陰與獨活頗相類本草又云曾青棗根為之使得當歸芍藥白芷川芎牡丹藁本甘草共療婦人得決明鯉魚膽汁青羊肝共療目痛惡狼毒山茱萸黃耆畏硝石滑石反藜蘆衍義云治頭面風痛不可缺也白芷氣溫味大辛純陽無毒氣味俱輕陽也陽明經引經藥手陽明經本經藥行足陽明經於升麻湯四味內加之象云治手陽明頭痛中風寒熱解利藥也以四味升麻湯主之珍云長肌肉散陽明之風心云治風通用去肺經風熱本草云主女子漏下赤白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤可作面脂療風邪久渴吐嘔兩脅滿風痛頭眩目癢日華子云補胎漏滑落破宿血補新血乳癰發背一切瘡疥排膿止痛生肌去面皯疵瘢明目其氣芳香治正陽陽明頭痛與辛夷細辛同用治鼻病內托用此長肌肉則陽明可知矣又云當歸為之使惡旋覆花川芎氣溫味辛純陽無毒入手足厥陰經少陽經本經藥象云補血治血虛頭痛之聖藥妊婦胎不動數月加當歸二味各二錢水二盞煎至一半服神效珍云散肝經之風貫芎治少陽經苦頭痛心云治少陽頭痛及治風通用本草云主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子除腦中冷痛面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中除內寒日華子云能除鼻洪吐血及溺血破癥結宿血養新血易老云上行頭目下行血海故清神四物湯所皆用也入手足厥陰經衍義云頭面風不可缺也然須以他藥佐之若單服久服則走散真氣即使他藥佐之亦不可久服中病即便已東垣云頭痛甚者加蔓荊子頂與腦痛加川芎若頭痛者加藁本諸經若頭痛加細辛若有熱者不能治別有青空之劑為緣諸經頭痛須用四味本草又云白芷為之使畏黃連麻黃氣溫味苦而甘辛氣味俱薄陽也升也甘熱純陽無毒手太陰之劑入足太陽經走手少陰經陽明經藥象云發太陽少陰經汗去節煮三二沸去上沫不則令人心煩悶心云陽明經藥去表上之寒邪甘熱去節解少陰寒散表寒發浮熱也珍云去榮中寒本草云主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚液云入足太陽手少陰能泄衛實發汗及傷寒無汗咳嗽根節能止汗夫麻黃治衛實之藥桂枝治衛虛之藥桂枝麻黃雖為太陽經藥其實榮衛藥也以其在太陽地分故曰太陽也本病者即榮衛肺主衛心主榮為血乃肺心所主故麻黃為手太陰之劑桂枝為手少陰之劑故傷風傷寒而嗽者用麻黃桂枝即湯液之源也藥性論云君味甘平治瘟疫本草又云厚朴為之使惡辛夷石葦藁本氣溫味大辛苦微溫氣厚味薄陽也升也純陽無毒太陽經本經藥象云太陽經風藥治寒邪結鬱於本經治頭痛腦痛大寒犯腦令人腦痛齒亦痛心云專治太陽頭痛其氣雄壯珍云治巔頂痛本草云主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色闢霧露潤澤療風邪嚲曳金瘡可作沐藥面脂實主流風四肢惡䕡茹此與木香同治霧露之氣與白芷同作面脂藥治療仲景云清明以前立秋以後凡中霧露之氣皆為傷寒又云清邪中於上焦皆霧露之氣神術白朮湯內加木香藁本擇其可而用之此既治風又治濕亦各從其類也桔梗氣微溫味辛苦陽中之陽味厚氣輕陽中之陰也有小毒入足少陰經入手太陰肺經藥象云治咽喉痛利肺氣去蘆米泔浸一宿焙乾用珍云陽中之陰謂之舟楫諸藥有此一味不能下沉治鼻塞心云利咽嗌胸膈之氣以其色白故屬肺辛甘微溫治寒嘔若咽中痛桔梗能散之也本草云主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五臟腸胃補血氣除寒熱風痹溫中消穀療咽喉痛下蠱毒易老云與國老並行同為舟楫之劑如將軍苦泄峻下之藥欲引至胸中至高之分成功非此辛甘不居譬如鐵石入江非舟楫不載故用辛甘之劑以升之也衍義云治肺熱氣奔促咳逆肺癰排膿本草又云節皮為之使得牡蠣遠志療恚怒得硝石石膏療傷寒畏白芨龍眼龍膽鼠黏子氣平味辛辛溫象云主風毒腫利咽膈吞一枚可出癰疽瘡頭珍云潤肺散氣秦艽氣微溫味苦辛陰中微陽手陽明經藥象云主寒熱邪氣風濕痹下水利小便治黃病骨蒸治口禁及腸風瀉血去蘆用珍云去手陽明經下牙痛口瘡毒去本經風濕本草云菖蒲為之使天麻氣平味苦無毒象云治頭風本草云主諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力其苗名定風草黑附子氣熱味大辛純陽辛甘溫大熱有大毒通行諸經引用藥入手少陽經三焦命門之劑象云性走而不守亦能除腎中寒甚白朮為佐名朮附湯除寒濕之聖藥也濕藥中少加之通行諸經引用藥也治經閉慢火炮珍云治脾濕腎寒本草云主風寒咳逆邪氣溫中金瘡破症堅積聚血瘕寒濕踒躄拘攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下利赤白堅肌骨強陰墮胎為百藥之長液云入手少陽三焦命門之劑浮中沉無所不至附子味辛大熱為陽中之陽故行而不止非若乾薑止而不行也非身表涼而四肢厥者不可僭用如用之者以其治四逆也本草又云地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參冬月採為附子春月採為烏頭烏頭氣熱味大辛辛甘大熱有大毒行諸經象云治風痹血痹半身不遂行經藥也慢火炮拆去皮用本草云主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可久視墮胎其汁煎之名射罔殺禽獸液云烏附天雄側子之屬皆水浸炮裂去皮臍用之多有外黃里白劣性尚在莫若乘熱切作片子再炒令表裡皆黃內外一色劣性皆去卻為良也世人罕如此制之縮砂氣溫味辛無毒入手足太陰經陽明經太陽經足少陰經象云治脾胃氣結滯不散主勞虛冷瀉心腹痛下氣消食本草云治虛勞冷瀉宿食不消赤白泄利腹中虛痛下氣液云與白檀豆蔻為使則入肺與人參益智為使則入脾與黃柏茯苓為使則入腎與赤白石脂為使則入大小腸蓽澄茄氣溫味辛無毒本草云主下氣消食皮膚風心腹間氣脹令人能食蓽撥氣溫味辛無毒本草云主溫中下氣補腰腳殺腥氣消食除胃冷陰疝痃癖衍義云走腸胃中冷氣嘔吐心腹滿痛多服走泄真氣令人腸虛下重香附子氣微寒味甘陽中之陰無毒本草云除胸中熱充皮毛久服令人益氣長鬚眉後世人用治崩漏本草不言治崩漏圖經云膀胱兩脅氣妨常日憂愁不樂飲食不多皮膚瘙癢癮疹日漸瘦損心忪少氣以是知益氣血中之氣藥也方中用治崩漏是益氣而止血也又能逐去凝血是推陳也與巴豆同治泄瀉不止又能治大便不通同意珍云快氣草豆蔻氣熱味大辛陽也辛溫無毒入足太陰經陽明經象云治風寒客邪在胃口之上善去脾胃客寒心與胃痛麵包煨熟去面用珍云益脾胃去寒本草云主溫中心腹痛嘔吐去口臭氣下氣脹滿短氣消酒進食止霍亂治一切冷氣調中補胃健脾亦能消食衍義云性溫而調散冷氣力甚速虛弱不能飲食宜此與木瓜烏梅縮砂益智曲糵鹽炒姜也白豆蔻氣熱味大辛味薄氣厚陽也辛大溫無毒入手太陰經珍云主積冷氣散肺中滯氣寬膈止吐逆治反胃消穀下氣進食去皮用心云專入肺經去白睛翳膜紅者不宜多用本草云主積聚冷氣止吐逆反胃消穀下氣液云入手太陰別有清高之氣上焦元氣不足以此補之延胡索氣溫味辛苦辛溫無毒入手足太陰經象云破血治氣月水不調小腹痛暖腰膝破癥瘕碎用液云治心氣痛小腹痛有神主破血產後諸疾因血為病者婦人月水不調腹中結塊崩漏淋露暴血上行因損下血茴香氣平味辛無毒入手足少陰經太陽經藥象云破一切臭氣調中止嘔下食炒黃色碎用本草云主諸瘻霍亂及蛇傷又能治腎勞㿗疝氣開胃下食又治膀胱陰痛腳氣少腹痛不可忍液云茴香本治膀胱藥以其先丙故云小腸也能潤丙燥以其先戊故從丙至壬又手足少陰二藥以開上下經之通道所以壬與丙交也紅藍花氣溫味辛辛而甘溫苦陰中之陽無毒象云治產後口噤血暈腹內惡血不盡絞痛破留血神效搓碎用心云和血與當歸同用珍云入心養血謂苦為陰中之陽故入心本草云主產後血暈胎死腹中並酒煮服亦主蠱毒下血其苗生搗敷遊腫其子吞數粒主天行瘡子不出其胭脂主小兒聤耳滴耳中仲景治六十二種風兼腹中血氣刺痛用紅花一大兩分為四分酒一大升煎強半頓服之良薑氣熱味辛純陽本草云治胃中冷逆霍亂腹痛反胃嘔食轉筋瀉痢下氣消宿食心云健脾胃黃耆氣溫味甘純陽甘微溫性平無毒入手少陽經足太陰經足少陰命門之劑象云治虛勞自汗補肺氣入皮毛瀉肺中火如脈弦自汗脾胃虛弱瘡瘍血脈不行內托陰證瘡瘍必用之去蘆用珍云益胃氣去肌熱諸痛必用之心云補五臟諸虛不足而瀉陰火去虛熱無汗則發之有汗則止之本草云主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病婦人子臟風邪氣逐五臟間惡血補丈夫虛損五勞羸瘦腹痛泄痢益氣利陰氣有白水耆赤水耆木耆功用皆同惟木耆莖短而理橫折之如綿皮黃褐色肉中白色謂之綿黃耆其堅脆而味苦者乃苜蓿根也又云破症癖腸風血崩帶下赤白痢及產前後一切病月候不調消渴痰嗽又治頭風熱毒目赤骨蒸生蜀郡山谷白水漢中今河東陝西州郡多有之耆與桂同功特味稍異比桂但甘平不辛熱耳世人以苜蓿根代之呼為土黃耆但味苦能令人瘦特味甘者能令人肥也頗能亂真用者宜審治氣虛盜汗並自汗即皮表之藥又治膚痛則表藥可知又治咯血柔脾胃是為中州藥也又治傷寒尺脈不至又補腎臟元氣為里藥是上中下內外三焦之藥今本草圖經只言河東者沁州綿上是也故謂之綿耆味甘如蜜兼體骨柔軟如綿世以為如綿非也別說云黃耆本出綿上為良故圖經所繪者憲水者也與綿上相鄰蓋以地產為綿若以柔韌為綿則偽者亦柔但以乾脆甘苦為別耳東垣云黃耆人參甘草三味退熱之聖藥也靈樞曰衛氣者所以溫分肉而充皮膚肥腠理而司開闔黃耆既補三焦實衛氣與桂同特益氣異耳亦在佐使桂則通血也能破血而實衛氣通內而實外者歟桂以血言一作色求則耆為實氣也惡鱉甲蒼朮氣溫味甘入足陽明太陰經象云主治同白朮若除上濕發汗功最大若補中焦除濕力小如白朮也衍義云其長如大拇指肥實皮色褐氣味辛烈須米泔浸洗再換泔浸二日去上粗皮東垣云入足陽明太陰能健胃安脾本草但言術不分蒼白其蒼朮別有雄壯之氣以其經泔浸火炒故能出汗與白朮止汗特異用者不可以此代彼海藏云蒼白有止發之異其餘主治並見圖經白朮氣溫味甘苦而甘溫味厚氣薄陰中陽也無毒入手太陽少陰經足陽明太陰少陰厥陰四經象云除濕益燥和中益氣利腰臍間血除胃中熱去諸經之濕理胃潔古云溫中去濕除熱降胃氣蒼朮亦同但味頗厚耳下行則用之甘溫補陽健脾逐水寒淫所勝緩脾生津去濕渴者用之本草在術條下無蒼白之名近多用白朮治皮間風止汗消痞補胃和中利腰臍間血通水道上而皮毛中而心胃下而腰臍在氣主氣在血主血潔古又云非白朮不能去濕非枳實不能消痞除濕利水道如何是益津液當歸氣溫味辛甘而大溫氣味俱輕陽也甘辛陽中微陰無毒入手少陰經足太陰經厥陰經象云和血補血尾破血身和血先水洗去土酒製過或火干日乾入藥血病須用去蘆用心云治血通用能除血刺痛以甘故能和血辛溫以潤內寒當歸之苦以助心散寒珍云頭止血身和血梢破血治上酒浸治外酒洗糖色嚼之大辛可能潰堅與菖蒲海藻相反本草云主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絕子諸惡瘡瘍金瘡煮汁飲之溫中止痛及腰痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五臟生肌肉氣血昏亂服之即定有各歸氣血之功故名當歸雷公云得酒浸過良若要破血即使頭節硬實處若要止痛止血即用尾若一時用不如不使易老云用頭則破血用尾則止血若全用則一破一止則和血也入手少陰以其心主血也入足太陰以其脾裹血也入足厥陰以其肝藏血也頭能破血身能養血尾能行血用者不分不如不使若全用在參耆皆能補血在牽牛大黃皆能破血佐使定分用者當知從桂附茱萸則熱從大黃芒硝則寒諸經頭痛俱在細辛條下惟酒蒸當歸又治頭痛以其諸頭痛皆屬木故以血藥主之藥性論云臣畏生薑惡濕面經云當歸主咳逆上氣當歸血藥如何治胸中氣藥性論云補女子諸不足此說盡當歸之用矣芍藥氣微寒味酸而苦氣薄味厚陰也降也陰中之陽有小毒入手足太陰經象云補中焦之藥得炙甘草為佐治腹中痛夏月腹痛少加黃芩如惡寒腹痛加肉桂一錢白芍藥三錢炙甘草一錢半此仲景神方也如冬月大寒腹痛加桂二錢半水二盞煎一半去皮用心云脾經之藥收陰氣能除腹痛酸以收之扶陽而收陰氣泄邪氣扶陰與生薑同用溫經散濕通塞利腹中痛胃氣不通肺燥氣熱酸收甘緩下利必用之藥珍云白補赤散瀉肝補脾胃酒浸行經止中部腹痛本草云主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣通順血脈緩中散惡血逐賊血去水氣利膀胱衍義云芍藥全用根其品亦多須用花紅而單葉者山中者佳花葉多則根虛然其根多赤色其味澀有色白粗肥者亦好余如經然血虛寒人禁此一物古人有言減芍藥以避中寒誠不可忽今見花赤者為赤芍藥花白者為白芍藥俗云白補而赤瀉東垣云但澀者為上或問古今方論中多以澀為收今本經有利小便一句者何也東垣云芍藥能停諸濕而益津液使小便自行本非通行之藥所當知之又問有緩中一句何謂緩中東垣云損其肝者緩其中又問當用何藥以治之東垣云當用四物湯以其內有芍藥故也赤者利小便下氣白者止痛散氣血入手足太陰經大抵酸澀者為上為收斂停濕之劑故主手足太陰經收降之體故又能至血海而入於九地之下後至厥陰經也後人用赤瀉白補者以其色在西方故補色在南方故泄也本草云能利小便非能利之也以其腎主大小二便既用此以益陰滋濕故小便得通也難經云損其肝者緩其中即調血也沒藥烏藥雷丸為之使本草又云惡石斛芒硝畏硝石鱉甲小薊反藜蘆液云腹中虛痛脾經也非芍藥不除補津液停濕之劑熟地黃氣寒味苦陰中之陽甘微苦味厚氣薄陰中陽也無毒入手足少陰經厥陰經象云酒灑蒸如烏金假酒力則微溫大補血衰者須用之善黑鬚發忌蘿蔔珍云若治外治上酒製心云生則性大寒而涼血熟則性寒而消腎本草云主折跌絕筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絕補五臟內傷不足通血脈益氣力利耳目生者尤良得清酒麥門冬尤良惡貝母畏蕪荑東垣云生地黃治手足心熱及心熱入手足少陰手足厥陰能益腎水而治血脈洪實者宜此若脈虛則宜熟地黃地黃假火力蒸九數故能補腎中元氣仲景制八味丸以熟地黃為諸藥之首天一所生之源也湯液四物以治藏血之臟亦以干熟地黃為君者癸乙同歸一治也蒸搗不可犯鐵若犯鐵令人消腎陳藏器云蒸乾即溫補生干即平宣機要云熟地黃臍下發痛者腎經也非地黃不能除補腎益陰之劑二宜丸加當歸為補髓生地黃氣寒味苦陰中之陽甘苦大寒無毒入手太陽經少陰經之劑象云涼血補血補腎水真陰不足此藥大寒宜斟酌用之恐損胃氣珍云生血涼血本草云主婦人崩中血不止及產後血上薄心悶絕傷身胎動下血胎不落墮墜踠折瘀血留血衄鼻吐血皆搗飲之液云手少陰又為手太陽之劑故錢氏瀉丙與木通同用以導赤也諸經之血熱與他藥相隨亦能治之溺血便血亦治之入四散例心云苦甘陰中微陽酒浸上行外行生血涼血去熱惡貝母畏蕪荑山藥氣溫味甘平無毒手太陰經藥本草云主補中益氣除熱強陰主頭面遊風風頭眼眩下氣充五臟長肌肉久服耳目聰明輕身耐老延年不飢手太陰藥潤皮毛燥涼而能補與二門冬紫芝為之使惡甘遂東垣云仲景八味丸用乾山藥以其涼而能補也亦治皮膚乾燥以此物潤之麻仁味甘平無毒入足太陰經手陽明經本草云主補中益氣中風汗出逐水利小便破積血復血脈乳婦產後余疾長髮可為沐藥久服肥健不老液云入足太陰手陽明汗多冒熱便難三者皆燥濕而亡津液故曰脾約約者約束之義內經謂燥者潤之故仲景以麻仁潤足太陰之燥及通腸也薏苡仁氣微寒味甘無毒本草云主筋急拘攣不可屈伸風濕痹下氣除筋骨邪氣不仁利腸胃消水腫令人能食久服輕身益氣其根能下三蟲仲景治風濕燥痛日晡所劇者與麻黃杏子薏苡仁湯甘草氣平味甘陽也無毒入足厥陰經太陰經少陰經象云生用大瀉熱火炙之則溫能補上焦中焦下焦元氣和諸藥相協而不爭性緩善解諸急故名國老去皮用甘草梢子生用為君去莖中痛或加苦楝酒煮玄胡索為主尤妙心云熱藥用之緩其熱寒藥用之緩其寒經曰甘以緩之陽不足補之以甘中滿禁用寒熱皆用調和藥性使不相悖炙之散表寒除邪熱去咽痛除熱緩正氣緩陰血潤肌珍云養血補胃梢子去腎中之痛胸中積熱非梢子不能除本草云主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡尰解毒溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒為九土之精安和七十二種石一千二百種草故名國老藥性論云君忌豬肉內經曰脾欲緩急食甘以緩之甘以補脾能緩之也故湯液用此以建中又曰甘者令人中滿又曰中滿者勿食甘即知非中滿藥也甘入脾歸其所喜攻也或問附子理中調胃承氣皆用甘草者如何是調和之意答曰附子理中用甘草恐其僭上也調胃承氣用甘草恐其速下也二藥用之非和也皆緩也小柴胡有柴胡黃芩之寒人參半夏之溫其中用甘草者則有調和之意中不滿而用甘為之補中滿者用甘為之泄此升降浮沉也鳳髓丹之甘緩腎濕而生元氣亦甘補之意也經云以甘補之以甘瀉之以甘緩之本草謂安和七十二種石一千二百種草名為國老雖非君而為君所宗所以能安和草石而解諸毒也於此可見調和之意夫五味之用苦直行而泄辛橫行而散酸束而收斂咸止而軟堅甘上行而發如何本草言下氣蓋甘之味有升降浮沉可上可下可內可外有和有緩有補有瀉居中之道盡矣入足厥陰太陰少陰能治肺痿之膿血而作吐劑能消五發之瘡疽每用水三碗慢火熬至半碗去渣服之消瘡與黃耆同功黃耆亦能消諸腫毒瘡疽修治之法與甘草同本草又云朮乾漆苦參為之使惡遠志反大戟芫花甘遂海藻四物白前氣微溫味甘微寒無毒本草云主胸脅逆氣咳嗽上氣狀似白薇牛膝輩衍義云白前保定肺氣治嗽多用白而長於細辛但粗而脆不似細辛之柔若以溫藥相佐使則尤佳仲景用白薇氣大寒味苦咸平無毒本草云主暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗發作有時療傷中淋露下水氣利陰氣益精近道處處有之狀似牛膝白前而短小療驚邪風狂痓病液云局方中多有用之治婦人以本經療傷中下淋露故也本草又云惡黃耆大黃大戟乾薑乾漆山茱萸大棗前胡氣微寒味苦無毒本草云主痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精半夏為使惡皂莢畏藜蘆
