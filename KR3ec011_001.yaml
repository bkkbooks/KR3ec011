body:
  text: 卷之一五臟苦欲補瀉藥味肝苦急急食甘以緩之甘草欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥虛以生薑陳皮之類補之經曰虛則補其母水能生木腎乃肝之母腎水也苦以補腎熟地黃黃柏是也如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心苦緩急食酸以收之五味子欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之人參黃耆甘草虛以炒鹽補之虛則補其母木能生火肝乃心之母肝木也以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散脾苦濕急食苦以燥之白朮欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連虛則以甘草大棗之類補之如無他證錢氏益黃散主之心乃脾之母以炒鹽補心實則以枳實瀉之如無他證以瀉黃散瀉之肺乃脾之子以桑白皮瀉肺肺苦氣上逆急食苦以瀉之訶子皮一作黃芩欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之五味子虛則五味子補之如無他證錢氏阿膠散補之脾乃肺之母以甘草補脾實則桑白皮瀉之如無他證以瀉白散瀉之腎乃肺之子以澤瀉瀉腎腎苦燥急食辛以潤之知母黃柏欲堅急食苦以堅之知母以苦補之黃柏以咸瀉之澤瀉虛則熟地黃黃柏補之腎本無實不可瀉錢氏只有補腎地黃丸無瀉腎之藥肺乃腎之母以五味子補肺以上五臟補瀉內經臟氣法時論中備言之欲究其精詳看本論臟腑瀉火藥黃連瀉心火木通瀉小腸火黃芩瀉肺火梔子佐之黃芩瀉大腸火柴胡瀉肝火黃連佐之柴胡瀉膽火亦以黃連佐之白芍藥瀉脾火石膏瀉胃火知母瀉腎火黃柏瀉膀胱火柴胡瀉三焦火黃芩佐之以上諸藥各瀉其火不惟止能如此更有治病合為君合為臣處詳其所宜而用勿執一也東垣先生藥類法象用藥法象天有陰陽風寒暑濕燥火三陰三陽上奉之溫涼寒熱四氣是也皆象於天溫熱者天之陽也涼寒者天之陰也此乃天之陰陽也地有陰陽金木水火土生長化收藏下應之辛甘淡酸苦鹹五味是也皆象於地辛甘淡者地之陽也酸苦鹹者地之陰也此乃地之陰陽也味之薄者為陰中之陽味薄則通酸苦咸平是也味之厚者為陰中之陰味厚則泄酸苦咸寒是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者為陽中之陰氣薄則發泄辛甘淡平涼寒是也輕清成象味薄茶之類本乎天者親上重濁成形味厚大黃之類本乎地者親下氣味辛甘發散為陽酸苦湧泄為陰清陽發腠理清之清者也清陽實四肢清之濁者也濁陰歸六腑濁之濁者也濁陰走五臟濁之清者也藥性要旨苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱氣味厚薄寒熱陰陽升降圖升降者天地之氣交茯苓淡為在天之陽也陽當上行何謂利水而泄下經云氣之薄者乃陽中之陰所以茯苓利水而泄下然而泄下亦不離乎陽之體故入手太陽麻黃苦為在地之陰也陰當下行何謂發汗而升上經云味之薄者乃陰中之陽所以麻黃升上而發汗然而升上亦不離乎陰之體故入手太陰附子氣之厚者乃陽中之陽故經云發熱大黃味之厚者乃陰中之陰故經云泄下粥淡為陽中之陰所以利小便茶苦為陰中之陽所以清頭目用藥升降浮沉補瀉法肝膽味辛補酸瀉氣溫補涼瀉肝膽之經前後寒熱不同逆順互換入求責法心小腸味鹹補甘瀉氣熱補寒瀉三焦命門補瀉同脾胃味甘補苦瀉氣溫涼寒熱補瀉各從其宜逆從互換入求責法肺大腸味酸補辛瀉氣涼補溫瀉腎膀胱味苦補咸瀉氣寒補熱瀉五臟更相平也一臟不平所勝平之此之謂也故云安穀則昌絶谷則亡水去則榮散谷消則衛亡榮散衛亡神無所居又仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫血溫衛和榮衛將行常有天命矣五味所用苦泄甘緩酸收咸軟淡滲泄辛散藥類法象風升生味之薄者陰中之陽味薄則通酸苦鹹平是也防風純陽性溫味甘辛升麻氣平味微苦柴胡氣平味苦辛羌活氣微溫味苦甘平威靈仙氣溫味苦葛根氣平味甘獨活氣微溫味苦甘平細辛氣溫味大辛桔梗氣微溫味甘辛白芷氣溫味大辛藁本氣溫味大辛鼠黏子氣平味辛蔓荊子氣清味辛川芎氣溫味辛天麻氣平味苦秦艽氣微溫味苦辛平荊芥氣溫味苦辛麻黃氣溫味甘苦前胡氣微寒味苦薄荷氣溫味苦辛熱浮長氣之厚者陽中之陽氣厚則發熱辛甘溫熱是也黑附子氣熱味大辛烏頭氣熱味大辛乾薑氣熱味大辛乾生薑氣溫味辛良薑氣熱味辛本味甘辛肉桂氣熱味大辛桂枝氣熱味甘辛草豆蔻氣熱味大辛丁香氣溫味辛厚朴氣溫味辛木香氣熱味苦辛益智氣熱味大辛白豆蔻氣熱味大辛川椒氣熱味大辛吳茱萸氣熱味苦辛茴香氣平味辛延胡索氣溫味辛縮砂氣溫味辛紅藍花氣溫味辛神麯氣大暖味甘濕化成戊濕其本氣平其兼氣溫涼寒熱在人以胃應之己土其本味鹹其兼味辛甘鹹苦在人以脾應之黃耆氣溫平味甘人參氣溫味甘甘草氣平味甘當歸氣溫味辛一作味甘熟地黃氣寒味苦半夏氣微寒味辛平白朮氣溫味甘蒼朮氣溫味甘陳皮氣溫味微苦青皮氣溫味辛藿香氣微溫味甘辛檳榔氣溫味辛蓬莪朮氣平味苦辛京三稜氣平味苦阿膠氣微溫味甘辛訶子氣溫味苦杏仁氣溫味甘苦大麥糵氣溫味鹹桃仁氣溫味甘苦紫草氣寒味苦蘇木氣平味甘鹹一作味酸燥降收氣之薄者陽中之陰氣薄則發泄辛甘淡平寒涼是也茯苓氣平味甘澤瀉氣平味甘豬苓氣寒味甘滑石氣寒味甘瞿麥氣寒味苦辛車前子氣寒味甘燈心草氣平味甘五味子氣溫味酸桑白皮氣寒味苦酸天門冬氣寒味微苦白芍藥氣微寒味酸麥門冬氣寒味微苦犀角氣寒味苦酸烏梅氣平味酸牡丹皮氣寒味苦地骨皮氣寒味苦枳殼氣寒味苦琥珀氣平味甘連翹氣平味苦枳實氣寒味苦酸木通氣平味甘寒沉藏味之厚者陰中之陰味厚則泄酸苦鹹氣寒是也大黃氣寒味苦黃柏氣寒味苦黃芩氣寒味苦黃連氣寒味苦石膏氣寒味辛草龍膽氣寒味大苦生地黃氣寒味苦知母氣寒味大辛防己氣寒味大苦茵陳氣微寒味苦平朴硝氣寒味苦辛栝蔞根氣寒味苦牡蠣氣微寒味鹹平玄參氣寒味微苦山梔子氣寒味微苦川楝子氣寒味苦平香豉氣寒味苦地榆氣微寒味甘鹹標本陰陽論天陽無圓氣上外升生浮晝動輕燥六腑地陰有方血下內降殺沉夜靜重濕五臟夫治病者當知標本以身論之則外為標內為本陽為標陰為本故六腑屬陽為標五臟屬陰為本此臟腑之標本也又臟腑在內為本各臟腑之經絡在外為標此臟腑經絡之標本也更人身之臟腑陰陽氣血經絡各有標本也以病論之先受病為本後傳流病為標凡治病者必先治其本後治其標若先治其標後治其本邪氣滋甚其病益畜若先治其本後治其標雖病有十數證皆去矣謂如先生輕病後滋生重病亦先治輕病後治重病如是則邪氣乃伏蓋先治本故也若有中滿無問標本先治中滿謂其急也若中滿後有大小便不利亦無問標本先利大小便次治中滿謂尤急也除大小便不利及中滿三者之外皆治其本不可不慎也從前來者為實邪從後來者為虛邪此子能令母實母能令子虛是也治法云虛則補其母實則瀉其子假令肝受心火之邪是從前來者為實邪當瀉其子火也然非真瀉其火十二經中各有金木水火土當木之分瀉其火也故標本論云本而標之先治其本後治其標既肝受火邪先於肝經五穴中瀉滎火行間穴是也後治其標者於心經五穴內瀉滎火少府穴是也以藥論之入肝經藥為之引用瀉心火藥為君是治實邪之病也假令肝受腎邪是從後來者為虛邪虛則當補其母故標本論云標而本之先治其標後治其本既受水邪當先於腎經湧泉穴補木是先治其標後於肝經曲泉穴中瀉水是後治其本此先治其標者推其至理亦是先治其本也以藥論之入腎經藥為引用補肝經藥為君是也五方之正氣味制方用藥附東方甲風乙木其氣溫其味甘在人以肝膽應之南方丙熱丁火其氣熱其味辛在人以心小腸三焦包絡應之中央戊濕其本氣平其兼氣溫涼寒熱在人以胃應之中央己土其本味鹹其兼味辛甘酸苦在人以脾應之西方庚燥辛金其氣涼其味酸在人以肺大腸應之北方壬寒癸水其氣寒其味苦在人以腎膀胱應之人乃萬物中之一也獨陽不生獨陰不長須稟兩儀之氣而生化也聖人垂世立教不能渾說必當分析以至理而言則陰陽相附不相離其實一也呼則因陽出吸則隨陰入天以陽生陰長地以陽殺陰藏此上說止明補瀉用藥君之一也故曰主病者為君用藥之機會要明輕清成象重濁成形本乎天者親上本乎地者親下則各從其類也清中清者清肺以助其天真清中濁者榮華腠理濁中清者榮養於神濁中濁者堅強骨髓故至真要大論云五味陰陽之用辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽鹹味湧泄為陰六者或收或散或緩或急或燥或潤或軟或堅各以所利而行之調其氣使之平也詳見本論
