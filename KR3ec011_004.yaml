body:
  text: 卷之四草部木香氣熱味辛苦純陽味厚於氣陰中陽也無毒象云除肺中滯氣若治中下焦氣結滯須用檳榔為使珍云治腹中氣不轉運和胃氣心云散滯氣調諸氣本草云治邪風闢毒疫瘟鬼強志主淋露療氣劣肌中偏寒主氣不足消毒瘟瘧蠱毒行藥之精本經云主氣劣氣不足補也通壅氣導一切氣破也安胎健脾胃補也除痃癖塊破也與本條補破不同何也易老以為破氣之劑不言補也知母氣寒味大辛苦寒味厚陰也降也苦陰中微陽無毒入足陽明經手太陰腎經本藥象云瀉足陽明經火熱補益腎水膀胱之寒去皮用心云瀉腎中火苦寒涼心去熱珍云涼腎腎經本藥上頸行經皆須用酒炒本草云主消渴熱中除邪氣肢體浮腫下水補不足益氣療傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疸多服令人泄東垣云入足陽明手太陰味苦寒潤治有汗骨蒸腎經氣勞瀉心仲景用此為白虎湯治不得眠者煩躁也煩者肺也躁者腎也以石膏為君主佐以知母之苦寒以清腎之源緩以甘草粳米之甘而使不速下也經云胸中有寒者瓜蒂散吐之又云表熱裡寒者白虎湯主之瓜蒂知母味皆苦寒而治胸中寒及裡寒何也答曰成無己注云即傷寒寒邪之毒為熱病也讀者要逆識之如論語言亂臣十人書言唯以亂民其能而亂四方亂皆治也乃治亂者也故云亂民亂四方也仲景所言寒之一字舉其初而言之熱病在其中矣若以寒為寒冷之寒無復用苦寒之劑兼言白虎證脈尺寸俱長則熱可知矣貝母氣平微寒味辛苦無毒本草云主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩渴出汗安五臟利骨髓仲景寒實結胸外無熱證者三物小陷胸湯主之白散亦可以其內有貝母也別說貝母能散胸中鬱結之氣殊有功本草又云厚朴白薇為之使惡桃花畏秦艽礜石莽草反烏頭海藏祖方下乳三母散牡蠣知母貝母三物為細末豬蹄湯調下黃芩氣寒味微苦苦而甘微寒味薄氣厚陽中陰也陰中微陽大寒無毒入手太陰經之劑象云治肺中濕熱療上熱目中赤腫瘀肉壅盛必用之藥泄肺受火邪上逆於膈上補膀胱之寒不足乃滋其化源也心云瀉肺中之火潔古云利胸中氣消膈上痰性苦寒下痢膿血稠黏腹疼後重身熱久不可者與芍藥甘草同用珍云除陽有餘涼心去熱通寒格陰中微陽酒炒上行主上部積血非此不能除肺苦氣上逆急食苦以泄之本草云主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火傷療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛東垣云味苦而薄中枯而飄故能瀉肺火而解肌熱手太陰劑也細實而中不空者治下部妙陶隱居云色深堅實者好又治奔豚臍下熱痛飄與實高下之分與枳實枳殼同例黃芩其子主腸澼膿血本草又云得厚朴黃連治腹痛得五味子牡蒙牡蠣令人有子得黃耆白蘞赤小豆療鼠瘻山茱萸龍骨為之使惡蔥實畏丹砂牡丹黎蘆張仲景治傷寒心下痞滿瀉心湯四方皆用黃芩以其去諸熱利小腸故也又太陽病下之利不止有葛根黃芩黃連湯亦主妊娠安胎散內多用黃芩今醫家常用有效者因著之千金方巴郡太守奏加減三黃丸療男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者久服之得行及奔馬甚驗陶隱居云黃芩圓者名子芩仲景治雜病方多用之黃連氣寒味苦味厚氣薄陰中陽也升也無毒入手少陰經象云瀉心火除脾胃中濕熱治煩躁噁心鬱熱在中焦兀兀欲吐心下痞滿必用藥也仲景治九種心下痞五等瀉心湯皆用之去須用心云瀉心經之火眼暴赤腫及諸瘡須用之苦寒者主陽有餘苦以除之安蛔通寒格療下焦虛堅腎珍云酒炒上行酒浸行上頭本草云主熱氣目痛眥傷泣出明目腸澼腹痛下痢婦人陰中腫痛五臟冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡久服令人不忘液云入手少陰苦燥故入心火就燥也然瀉心其實瀉脾也為子能令母實實則瀉其子治血防風為上使黃連為中使地榆為下使海藏祖方令終身不發斑瘡煎黃連一口兒生未出聲時灌之大應已出聲灌之斑雖發亦輕古方以黃連為治痢之最衍義云治痢有微血不可執以黃連為苦燥劑虛者多致危困實者宜用之本草又云龍骨理石黃芩為之使惡菊花芫花玄參白蘚皮畏款冬花勝烏頭解巴豆毒大黃氣寒味苦大寒味極厚陰也降也無毒入手足陽明經酒浸入太陽經酒洗入陽明經余經不用酒象云性走而不守瀉諸實熱不通下大便滌蕩腸胃間熱專治不大便心云滌蕩實熱珍云熱淫於內以苦泄之酒浸入太陽經酒洗入陽明經余經不用酒本草云主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結液云味苦寒陰中之陰藥泄漏推陳致新去陳垢而安五臟謂如戡定禍亂以致太平無異所以有將軍之名入手足陽明以酒引之上至高巔以舟楫載之胸中可浮以苦泄之性峻至於下以酒將之可行至高之分若物在巔人跡不及必射以取之也故太陽陽明正陽陽明承氣湯中俱用酒浸惟少陽陽明為下經故小承氣湯中不用酒浸也雜方有生用者有面裹蒸熟者其制不等衍義云損益前書已具仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣既不足矣而不用補心湯更用瀉心湯何也答曰若心氣獨不足則須當不吐衄也此乃邪熱因心氣不足而客之故令吐衄以苦泄其熱就以苦補其心蓋一舉而兩得之有是證者用之無不效惟在量其虛實而已本草又云惡乾漆連翹氣平味苦苦微寒氣味俱輕陰中陽也無毒手足少陽經陽明經藥象云治寒熱瘰癧諸惡瘡腫除心中客熱去胃蟲通五淋心云瀉心經客熱諸家須用瘡家聖藥也珍云諸經客熱非此不能除本草云主寒熱鼠瘻瘰癧癰腫癭瘤結熱蠱毒去寸白蟲液云手足少陽治瘡瘍瘤氣癭起結核有神與柴胡同功但分氣血之異耳與鼠黏子同用治瘡瘍別有神功連軺氣寒味苦本經不見所注但仲景古方所注云即連翹之根也方言熬者即今之炒也人參氣溫味甘甘而微苦微寒氣味俱輕陽也陽中微陰無毒象云治脾肺陽氣不足及能補肺氣促短氣少氣補而緩中瀉脾肺胃中火邪善治短氣非升麻為引用不能補上升之氣升麻一分人參三分為相得也若補下焦元氣瀉腎中火邪茯苓為之使心云補氣不足而瀉肺火甘溫而補陽利氣脈不足者是亡血也人參補之益脾與乾薑同用補氣裡虛則腹痛此藥補之是補不足也珍云補胃喘嗽勿用短氣用之本草云主補五臟安精神定魂魄止驚悸除邪氣明目開心益智療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘液云味既甘溫調中益氣即補肺之陽瀉肺之陰也若便言補肺而不論陰陽寒熱何氣不足則誤矣若肺受寒邪宜此補之肺受火邪不宜用也肺為天之地即手太陰也為清肅之臟貴涼而不貴熱其象可知若傷熱則宜沙參沙參味苦甘微寒無毒主血積驚氣除寒熱補中益肺氣療胃痹心腹痛結熱邪氣頭痛皮間邪熱安五臟補中人參補五臟之陽也沙參苦微寒補五臟之陰也安得不異易老云用沙參代人參取其味甘可也葛洪云沙參主卒得諸疝小腹及陰中相引痛如絞自汗出欲死細末酒調服方寸匕立瘥日華子云治惡瘡疥癬及身癢排膿消腫毒海藏云今易老取沙參代人參取其甘也若微苦則補陰甘者則補陽雖云補五臟亦須各用本臟藥相佐使隨所引而相輔一臟也不可不知沙參味苦甘微寒無毒治證附前人參條下半夏氣微寒味辛平苦而辛辛厚苦輕陽中陰也生微寒熟溫有毒入足陽明經太陰經少陽經象云治寒痰及形寒飲冷傷肺而咳大和胃氣除胃寒進食治太陰痰厥頭痛非此不能除心云能勝脾胃之濕所以化痰渴者禁用珍云消胸中痞去膈上痰本草云主傷寒寒熱心下堅下氣咽喉腫痛頭眩胸脹咳逆腸鳴止汗消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫墮胎療痿黃悅澤面目生令人吐熟令人下用之湯洗去滑令盡用生薑等分制用能消痰涎開胃健脾射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭藥性論云半夏使忌羊血海藻飴糖柴胡為之使俗用為肺藥非也止吐為足陽明除痰為足太陰小柴胡中雖為止嘔亦助柴胡能止惡寒是又為足少陽也又助黃芩能去熱是又為足陽明也往來寒熱在表裡之中故用此有各半之意本以治傷寒之寒熱所以名半夏經云腎主五液化為五濕自入為唾入肝為泣入心為汗入脾為痰入肺為涕有涎曰嗽無涎曰咳痰者因咳而動脾之濕也半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形痰有形無形則潤有形則燥所以為流濕潤燥也五味子氣溫味酸陰中陽酸而微苦味厚氣輕陰中微陽無毒入手太陰經入足少陰經象云大益五臟孫真人云五月常服五味子以補五臟氣遇夏月季夏之間困乏無力無氣以動與黃耆人參麥門冬少加黃柏煎湯服使人精神頓加兩足筋力湧出生用珍云治咳嗽心云收肺氣補氣不足升也酸以收逆氣肺寒氣逆則以此藥與乾薑同用治之本草云主咳逆上氣勞傷羸瘦補不足益氣強陰益精養五臟除熱日華子云明目暖水臟治風下氣消食霍亂轉筋痃癖奔豚冷氣消水腫反胃心腹氣脹止渴除煩熱解酒毒壯筋骨五味皮甘肉酸核中辛苦都有鹹味故名五味子仲景八味丸用此為腎氣丸述類象形也孫真人云六月常服五味子以益肺金之氣在上則滋源在下則補腎故入手太陰足少陰也甘遂氣大寒味苦甘甘純陽有毒本草云主大腹疝瘕腹滿面目浮腫留飲宿食破堅消積利水穀道下五水散膀胱留熱皮中痞熱氣腫滿瓜蒂為使惡遠志反甘草液云可以通水而其氣直透達所結處衍義云此藥專於行水攻決為用入藥須斟酌用之珍云若水結胸中非此不能除大戟氣大寒味苦甘陰中微陽有小毒本草云治蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭疼發汗利大小腸此澤漆根也液云與甘遂同為泄水之藥濕勝者苦燥除之反甘草與芫花黃藥子等分水糊為丸桐子大每服十丸傷風傷寒蔥白湯下傷食陳皮湯下或十五丸微加至止亦可芫花別有條海藏十棗湯同用珍云瀉肺損真氣蕘花氣微寒味苦辛有毒本草云主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道療痰飲咳嗽衍義云仲景以蕘花治利者以其行水也水去則利止其意如此用時斟酌不可太過與不及也仍察其須有是證方可用之仲景小青龍湯若微利去麻黃加蕘花如雞子熬令赤色用之蓋利水也海藻氣寒味鹹本草云主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚暴㿉留氣熱結利小便珍云洗去咸泄水氣商陸根氣平味辛酸有毒本草云主水脹疝瘕痹尉除癰腫殺鬼精物治胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣如人形者有神珍云辛酸同用導腫氣旋覆花氣溫味鹹甘冷利有小毒本草云主補中下氣消堅軟痞消胸中痰結吐如膠漆臍下膀胱留飲利大腸通血脈發汗吐下後心下痞噫氣不除者宜此仲景治傷寒汗下後心下痞堅噫氣不除旋覆代赭湯胡洽治痰飲兩脅脹滿旋覆花丸用之尤佳澤瀉氣平味甘甘咸寒味厚陰也降也陰中微陽入足太陽經少陰經象云除濕之聖藥治小便淋瀝去陰間汗無此疾服之令人目盲心云去舊水養新水寒水氣須用珍云滲瀉止渴本草云治風寒濕痹乳難消水養五臟益氣力肥健補虛損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水扁鵲云多服病人眼衍義云其功尤長於行水仲景云水畜煩渴小便不利或吐或瀉五苓散主之方用澤瀉故知其用長於行水本經又引扁鵲云多服病人眼誠為行去其水故也仲景八味丸用之者亦不過接引桂附等歸就腎經別無他意凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用本經云久服明目扁鵲謂多服昏目何也易老云去胞中留垢以其味鹹能泄伏水故去留垢即胞中陳積物也入足太陽少陰仲景治太陽中風入里渴者五苓散主之紅豆蔻氣溫味辛無毒本草云主腸虛水瀉心腹絞痛霍亂嘔吐酸水解酒毒不宜多服令人舌粗不能飲食液云是高良薑子用紅豆蔻復用良薑如用官桂復用桂花同意肉豆蔻氣溫味辛無毒入手陽明經本草云主鬼氣溫中治積冷心腹脹痛霍亂中惡冷疰嘔沫冷氣消食止泄小兒傷乳霍亂甘松氣平味甘溫無毒本草云主惡氣卒心腹痛滿治黑皮䵟𪒟風疳齒䘌蜀漆氣微溫味辛純陽辛平有毒珍云破血心云洗去腥與苦酸同用導膽本草云主瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼疰療胸中邪結氣能吐出之成無己注云火邪錯逆加蜀漆之辛以散之蒲黃氣平味甘無毒本草云主心腹膀胱寒熱利小便止血消瘀血又云治一切吐衄唾溺崩瀉撲症帶下等血並皆治之並瘡癤通月候墮胎兒枕急痛風腫鼻洪下乳止泄精血利如破血消腫則生用補血止血則炒用天門冬氣寒味微苦苦而辛氣薄味厚陰也甘平大寒無毒陽中之陰入手太陰經足少陰經象云保肺氣治血熱侵肺上喘氣促加人參黃耆為主用之神效心云苦以泄滯血甘以助元氣及治血妄行此天門冬之功也本草云主諸暴風濕偏痹強骨髓殺三蟲去伏尸保定肺氣去寒熱養肌膚益氣力利小便冷而能補久服延年多子孫能行步益氣入手太陰足少陰經榮衛枯涸濕劑所以潤之二門冬人參北五味子枸杞子同為生脈之劑此上焦獨取寸口之意日華子云貝母為使鎮心潤五臟益皮膚悅顏色補五勞七傷治肺氣並嗽消痰及風痹熱毒遊風煩悶吐血去心用麥門冬氣寒味微苦甘微寒陽中微陰也無毒入手太陰經象云治肺中伏火脈氣欲絶加五味子人參三味為生脈之劑補肺中元氣不足珍云行經酒浸湯浸去心治經枯心云補心氣不足及治血妄行補心不足本草云主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色有子地黃車前子為之使惡款冬花苦瓠畏苦參青蘘入手太陰衍義云治肺熱之功為多其味苦但專泄而不專收寒多人禁服治心肺虛熱及虛勞麥門冬地黃麻仁阿膠潤經益血復脈通心二門冬五味子枸杞子同為生脈之劑葳蕤氣平味甘無毒本草云主中風暴熱不能動搖跌筋結肉諸不足心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出久服去面黑䵟心云潤肺除熱茵陳蒿氣微寒味苦平陰中微陽無毒入足太陽經象云除煩熱主風濕熱邪結於內去枝梗用葉本草云主風濕寒熱邪氣熱結黃疸通身發黃小便不利除頭熱去伏瘕入足太陽仲景茵陳梔子大黃湯治濕熱也梔子柏皮湯治燥熱也如苗潦則濕黃苗旱則燥黃濕則瀉之燥則潤之可也此二藥治陽黃也韓祗和李思訓治陰黃茵陳附子湯大抵以茵陳為君主佐以大黃附子各隨其寒熱珍云治傷寒發黃艾葉氣溫味苦陰中之陽無毒本草云止下痢吐血下部䘌瘡闢風寒令人有子灸百病重午日日未出時不語採心云溫胃白頭翁氣寒味辛苦無毒有毒本草云主溫瘧狂易音羊寒熱癥瘕積聚癭氣逐血止痛療金瘡鼻衄心云下焦腎虛純苦以堅之一名野丈人一名胡王使者百合氣平味甘無毒本草云主邪氣腹脹心痛利大小便補中益氣除浮腫臚脹痞滿寒熱遍身疼痛及乳難喉痹止涕淚仲景治百合病百合知母湯百合滑石代赭石湯有百合雞子湯百合地黃湯或百合病已經汗者或未經汗下吐者或病形如初或病變寒熱並見活人書治傷寒腹中疼百合一兩炒黃為末米飲調服孫真人云治百合陰毒煮百合濃汁服一升蓯蓉氣溫味甘咸酸無毒本草云主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕除膀胱邪氣腰痛止痢久服輕身液云命門相火不足以此補之玄參氣微寒味苦咸無毒象云足少陰腎經之君藥也治本經須用本草云主腹中寒熱積聚女子産乳余疾補腎氣令人目明主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧灑灑血瘕下寒血除胸中氣下水止煩渴易老云玄參乃樞機之劑管領諸氣上下肅清而不濁風藥中多用之故活人書治傷寒陽毒玄參升麻湯治汗下吐後毒不散則知為肅清樞機之劑以此論之治空中氤氳之氣無根之火以玄參為聖藥款冬花氣溫味甘辛純陽無毒珍云溫肺止嗽本草云主咳逆上氣善喘喉痹諸驚癇寒熱邪氣消渴喘息呼吸杏仁為之使得紫菀良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙藥性論云君主療肺氣心促急熱乏勞咳連連不絶涕唾稠黏肺痿肺癰吐膿日華子云潤心肺益五臟除煩補勞劣消痰止嗽肺痿吐血心虛驚悸衍義云有人病嗽多日或教以燃款冬花三兩枚於無風處以筆管吸其煙滿口則咽之數日效時習云仲景射干湯用之紫參氣微寒味苦辛無毒本草云主心腹積聚寒熱邪氣通九竅利大小便療腸胃大熱唾血衄血腸中聚血癰腫諸瘡止渴益精仲景治痢紫參湯主之紫參半斤甘草三兩水五升煎紫參取二升卻內甘草煎取半升分溫三服苦參氣寒味苦氣沉純陰心云除濕本草云主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚養肝膽氣安五臟定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部䘌平胃氣令人嗜食輕身衍義云有人病遍身風熱細疹癢痛不可任連胸頸臍腹近陰處皆然涎痰亦多夜不得睡以苦參末一兩皂角二兩水一升揉濾取汁銀石器熬成膏和苦參末為丸如梧桐子大食後溫水下二十丸至三十丸次日便愈時習云苦參揩齒久能病腰蘆根氣寒味甘本草云主消渴客熱止小便金匱玉函治五噎膈氣煩悶吐逆不下食蘆根五兩銼水三盞煮一盞去渣服無時射干又名烏扇氣平味苦微溫有毒本草云主咳逆上氣喉閉咽痛不得消息散結氣腹中邪逆食飲大熱療老血在心脾間咳唾言語氣臭散胸中熱氣衍義云治肺氣喉痹為佳仲景治咽中動氣或閉塞烏扇湯中用時習云仲景射干湯用之心云去胃癰敗醬氣微寒平味苦咸無毒入足少陰經手厥陰經本草云主暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣除癰腫浮腫結熱風痹不足産後疾痛仲景治腸癰有膿者薏苡仁附子敗醬湯薏苡仁二十分附子二分敗醬五分三物為末取方寸匕以水二升煎取一升頓服之小便當下愈敗蒲氣平本草云主筋溢惡瘡藥性論云亦可單用主破血取蒲黃赤芍藥當歸大黃朴硝同服治跌撲瘀血陳藏器云聖惠方治霍亂葦葉液云同蘆差大耳防己氣寒味大苦辛苦陰也平無毒通行十二經象云治腰以下至足濕熱腫盛腳氣補膀胱去留熱通行十二經去皮用本草云主風寒溫瘧熱氣諸癇除邪利大小便療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄散癰腫惡結諸蝸疥癬蟲瘡通腠理利九竅藥性論云漢防己君又云木防己使畏女菀滷咸去血中濕熱牽牛氣寒味苦有小毒黑白二種本草云主下氣療腳滿水腫除風毒利小便海藏云以氣藥引之則入氣以大黃引之則入血張文懿云不可耽嗜脫人元氣余初亦疑此藥不可耽嗜後見人有酒食病痞多服食藥以導其氣及服藏用神芎丸及犯牽牛等丸如初服即快藥過再食其病痞依然依前又服其痞隨藥而效藥過後病復至以至久服則脫人元氣而猶不知悔戒之惟當益脾健胃使元氣生而自能消腐水穀其法無以加矣心云瀉元氣去氣中濕熱凡飲食勞倦皆血受病若以此藥瀉之是血病瀉氣使氣血俱虛損所傷雖去瀉元氣損人不知也經所謂毋盛盛毋虛虛毋絶人長命此之謂也用者戒之白者亦同羅謙甫云牽牛乃瀉氣之藥試取嘗之便得辛辣之味久而嚼之猛烈雄壯漸漸不絶非辛而何續注味苦寒果安在哉又曰牽牛感南方熱火之化所生者也血熱瀉氣差誤已甚若病濕盛濕氣不得施化致大小便不通則宜用之耳濕去其氣周流所謂五臟有邪更相平也經所謂一臟未平以所勝平之火能平金而瀉肺氣者即此也然仲景治七種濕證小便不利無一藥犯牽牛者仲景豈不知牽牛能瀉濕利小便為濕病之根在下焦是血分中氣病不可用辛辣氣藥瀉上焦太陰之氣故也仲景尚不輕用如此世醫一概而用之可乎又曰牽牛辛烈瀉人元氣比諸辛藥尤甚以辛之雄烈故也三稜氣平味苦陰中之陽無毒象云治老癖癥瘕結塊婦人血脈不調心腹刺痛須炮用珍云破積氣損真氣虛者勿用液云又治氣脹血脈不調補五勞通月經消瘀血色白破血中之氣蓬莪朮氣溫味苦辛無毒象云治心膈痛飲食不消破痃癖氣最良炮用本草云治婦人血氣丈夫賁豚治心腹痛中惡疰杵鬼氣霍亂冷氣吐酸水解毒飲食不消酒研服液云色黑破氣中之血入氣藥發諸香雖為泄劑亦能益氣故孫用和治氣短不能接續所以大小七香丸集香丸散及湯內多用此也草龍膽氣寒味大苦氣味俱厚陰也無毒珍云純陰酒浸上行心云除下焦之濕及翳膜之濕象云治兩目赤腫睛脹瘀肉高起疼痛不可忍以柴胡為主治眼中疾必用之藥也去蘆栝蔞根氣寒味苦味厚陰也無毒本草云主消渴身熱煩滿大熱補虛安中通月水消腫毒瘀血及熱狂心云止渴行津液苦寒與辛酸同用導腫氣珍云苦純陰若心中枯渴者非此不能除地榆氣微寒味甘酸苦而酸氣味俱厚陰也本草云主婦人乳産七傷帶下月水不止血崩之疾除惡血止疼痛腸風泄血象云治小兒疳痢性沉寒入下焦治熱血痢去蘆心云去下焦之血腸風下血及瀉痢下血須用之珍云陽中微陰治下部血紫草氣寒味苦無毒本草云主心腹邪氣五疸補中益氣利九竅通水道治腹腫脹滿去土用茸茜根味苦陰中微陽珍云去諸死血藥性論云主治六極傷心肺吐血瀉血日華子云止鼻洪月經不止菊花苦而甘寒無毒心云去翳膜明目珍云養目血藥性論云使治身上諸風日華子云治四肢遊風利血脈心煩胸膈壅悶葶藶氣大寒味苦辛無毒本草云主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣及皮間邪水上出面目浮腫身暴中風熱痱癢利小便久服令人虛又云療肺壅上氣咳嗽定喘促除胸中痰飲液云苦甜二味主治同仲景用苦余方或有用甜者或有不言甜苦者大抵苦則下泄甜則少緩量病虛實用之不可不審本草雖云治同甜苦之味安得不異榆白皮為之使惡殭蠶石龍芮仲景葶藶大棗瀉肺湯用之王不留行味苦陽中之陰甘平無毒珍云下乳引導用之藥性論云治風毒通血脈日華子云治遊風風疹婦人月經不勻通草氣平味甘辛陽也無毒燈草同象云治陰竅不利行小水除水腫閉治五淋生用珍云瀉肺利小便甘平以緩陰血日華子云明目退熱催生下胞下乳木通氣平味甘甘而淡性平味薄陽也無毒象云主小便不利導小腸熱去皮用心云通經利竅本草云除脾胃寒熱通利九竅血脈關節令人不忘散癰腫諸結不消墮胎去蟲瞿麥氣寒味苦辛陽中微陰也象云主關格諸癃結小便不通治癰腫排膿明目去翳破胎下閉血逐膀胱邪熱用穗珍云利小便為君主之用本草云出刺決癰腫明目去翳破胎墮子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮車前子氣寒味甘咸無毒象云主氣癃閉利水道通小便除濕痹肝中風熱沖目赤痛本草云主氣癃止痛利水道通小便除濕痹男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目治目熱赤痛輕身耐老東垣云能利小便而不走氣與茯苓同功石葦此一條與本經無一字同恐別是一物有誤姑存之名遠墨子血見愁鹿經草也時習云今一種作青苕帚名蟻子槐作血見愁又隰州鼓角樓上一種名血見愁俱能破瘀血時習補或人言紫花如旋風草但花不白又有一種花黃葉似槐結角如緑豆俗呼夾竹梅局方本草石葦味苦甘平無毒主勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱滿補五勞安五臟去惡風益精氣藥性論云使治勞及五淋胞囊結熱不通膀胱熱滿日華子云治淋遺溺杏仁為之使得菖蒲良生華陰又有生古瓦屋上者名瓦韋用治淋亦佳白附子陽微溫珍云主血痹行藥勢本草云主心痛血痹面上百病行藥勢葫蘆巴苦純陰珍云治元氣虛冷及腎虛冷本草云得蘹香子桃仁治膀胱氣甚效腹脅脹滿面色青黑此腎虛證也馬兜鈴苦陰中微陽味苦寒無毒珍云去肺熱安肺氣補肺本草云主咳嗽痰結藥性論云平能主肺氣上急坐息不得主咳逆連連不可日華子云治痔瘻瘡以藥於瓶中燒熏病處入藥炙用是土青木香獨行根子也聖惠方治五種蠱毒圖經云亦名土青木香實主肺病根治氣下膈止刺痛白芨苦甘陽中之陰味辛苦平微寒無毒珍云止肺澀白蘞治證同本草云主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收白癬疥蟲藥性論云使治熱結不消主陰下痿治面上䵟疱天南星味苦辛有毒珍云治同半夏陳藏器云主金瘡傷折瘀血取根搗敷傷處日華子云味辛烈治撲損瘀血主蛇蟲咬敷疥癬毒瘡鬱金味辛苦純陰珍云涼心局方本草鬱金味辛苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡藥性論云單用亦可治婦人宿血結聚溫醋磨服經驗方云尿血不定蔥白相和煎服效本草云生蜀者佳胡人謂之馬蒁亦啖馬藥用治脹痛破血而補佛耳草氣熱味酸象云治寒嗽及痰除肺中寒大升肺氣少用款冬花為使過食損目蛇床味苦辛甘平無毒本草云主婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡瘡溫中下氣令婦人子臟熱男子陰強久服輕身好顏色令人有子一名蛇粟蛇米五月採陰乾惡牡丹巴豆貝母
