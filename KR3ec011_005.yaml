body:
  text: 卷之五木部桂桂心肉桂桂枝附氣溫味甘辛有小毒入手少陰經桂枝入足太陽經本草云主溫中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆能墮胎堅骨節通血脈理疏不足宣導百藥無所畏久服神仙不老生桂陽二月八月十月採皮陰乾有菌桂牡桂木桂筒桂肉桂板桂桂心官桂之類用者罕有分別衍義所言不知何緣而得官之名豫考本草有出觀賓宜韶欽諸州者佳世人以筆畫多而懶書之故只作官也如寫黃檗作黃柏薑作姜同意菌桂生交趾山谷牡桂生南海山谷木桂生桂陽從嶺至海盡有桂樹惟柳州象州最多本草所說菌桂牡桂板桂厚薄不同大抵細薄者為枝為嫩厚脂者為肉為老處其身者為中也不必黃色為桂心但不用皮與里止用其身中者為桂心不經水而味薄者亦名柳桂易老用此以治虛人使不生熱也衍義謂桂大熱素問謂辛甘發散為陽故張仲景桂枝湯治傷寒表虛皆須此藥是專用辛甘之意也又云療寒以熱故知三種之桂不取菌桂牡桂者蓋此二種性止溫而已不可以治風寒之病獨有一字桂本經謂甘辛大熱正合素問辛甘發散為陽之說尤知菌桂牡桂不及也然本經止言桂而仲景又言桂枝者蓋亦取其枝上皮也其本身粗厚處亦不中用諸家之說但各執一己見終無證據今又謂之官桂不知何緣而立名慮後世以為別物故於此書之又有桂心此則諸桂之心不若一字桂也別說交廣商人所販者及醫家見用惟陳藏器之說最是然筒桂厚實氣味厚重者宜入治臟及下焦藥輕薄者宜入治眼目發散藥本經以菌桂養精神以牡桂利關節仲景傷寒發汗用桂枝桂枝者桂條也非身干也取其輕薄而能發散一種柳桂乃小嫩枝條也尤宜入上焦藥仲景湯液用桂枝發表用肉桂補腎本乎天者親上本乎地者親下理之自然性分之所不可移也一有差易為效彌遠歲月既久習以成弊宜後世之不及古也桂心通神不可言之至於諸桂數等皆大小老壯之不同觀作官也本草所言有小毒或云久服神仙不老雖云小毒亦從類化與黃芩黃連為使小毒何施與烏附為使止是全得熱性若與有毒者同用則小毒既去大毒轉甚與人參麥門冬甘草同用能調中益氣則可久服可知此藥能護榮氣而實衛氣則在足太陽經也桂心入心則在手少陰也若指榮字立說止是血藥故經言通血脈也若與巴豆硇砂乾漆穿山甲水蛭虻蟲如此有毒之類同用則小毒化為大毒其類化可知矣湯液發汗用桂枝補腎用肉桂小柴胡只云加桂何也藥象謂肉桂大辛補下焦熱火不足治沉寒痼冷及治表虛自汗春夏二時為禁藥珍云秋冬治下部腹痛非桂不能止也心云桂枝氣味俱輕故能上行發散於表內寒則肉桂補陽則柳桂桂辛熱散經寒引導陽氣若正氣虛者以辛潤之散寒邪治奔豚柏子仁氣平味甘辛無毒本草云主安五臟除風濕痹益氣血能長生令人潤澤美顏色耳目聰明用之則潤腎之藥也藥性論云柏子仁君惡菊花畏羊蹄草能治腰腎中冷膀胱冷膿宿水興陽道益壽去頭風治百邪鬼魅主小兒驚癇柏子仁古方十精丸用之側柏葉氣微溫味苦無毒本草云主吐血衄血及痢血崩中赤白輕身益氣令人耐寒暑藥性論云側柏葉苦辛性澀治冷風歷節疼痛止尿血與酒相宜柏皮本草黑字柏白皮主火灼爛瘡長毛髮槐實味苦酸咸寒無毒珍云與桃仁治證同藥性論云臣治大熱難産皮煮汁淋陰囊墜腫氣瘤又槐白皮治口齒風疳日華子云槐子治丈夫女人陰瘡濕癢催生吞七粒皮治中風皮膚不仁喉痹洗五痔産門癢痛及湯火瘡煎膏止痛長肉消癰腫別録云八月斷槐大枝使生嫩蘖煮汁釀酒療大風痿痹甚妙槐耳主五痔心痛女人陰中瘡痛景天為之使槐花味苦無毒治五痔心痛眼赤殺腹臟蟲及熱治皮膚風腸風瀉血赤白痢槐膠主一切風化痰治肝臟風筋脈抽掣急風口噤四肢不收頑痹或毒風周身如蟲行或破傷風口眼偏斜腰膝強硬槐葉平無毒煎湯洗小兒驚疳壯熱疥癬疔瘡皮莖同用良槐花苦薄陰也珍云涼大腸熱蔓荊子氣清味辛溫苦甘陽中之陰太陽經藥象云治太陽經頭痛頭昏悶除目暗散風邪藥胃虛人勿服恐生痰疾揀淨杵碎用珍云涼諸經血止頭痛主目睛內痛本草云惡烏頭石膏大腹子氣微溫味辛無毒本草云主冷熱氣攻心腹大腸壅毒痰膈醋心並以薑鹽同煎時習謂是氣藥也孫真人云先酒洗後大豆汁洗仲景用日華子云下一切氣止霍亂通大小腸健脾開胃調中酸棗氣平味酸無毒本草云主心腹寒熱邪結氣聚四肢痠疼濕痹煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣令人肥健久服安五臟輕身延年胡洽治振悸不得眠人參白朮白茯苓甘草生薑酸棗仁六物煮服聖惠方膽虛不眠寒也酸棗仁炒香竹葉湯調服濟衆方膽實多睡熱也酸棗仁生用末茶薑汁調服胡椒氣溫味辛無毒本草云主下氣溫中去痰除臟腑中風冷向陽者為胡椒向陰者為蓽澄茄胡椒多服損肺味辛辣力大於漢椒衍義云去胃中寒痰吐水食已即吐甚驗過劑則走氣大腸寒滑亦用須各以他藥佐之川椒氣熱溫味大辛辛溫大熱有毒象云主邪氣溫中除寒痹堅齒髮明目利五臟須炒去汗心云去汗辛熱以潤心寒本草云主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下痢泄精女子字乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒耐寒暑開腠理閉口者殺人惡栝蔞防葵畏雌黃吳茱萸氣熱味辛苦氣味俱厚陽中陰也辛溫大熱有小毒入足太陰經少陰經厥陰經象云食則令人口開目瞪寒邪所隔氣不得上下此病不已令人寒中腹滿膨脹下利寒氣諸藥不可代也洗去苦味日乾杵碎用心云去胸中逆氣不宜多用辛熱恐損元氣珍云溫中下氣溫胃本草云主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理去痰冷腹內絞痛諸冷實不消中惡心腹痛逆氣利五臟入足太陰少陰厥陰震坤合見其色緑仲景云吳茱萸湯當歸四逆湯大溫脾湯及脾胃藥皆用此也衍義云此物下氣最速腸虛人服之愈甚蓼實為之使惡丹參硝石白堊畏紫石英山茱萸氣平微溫味酸無毒入足厥陰經少陰經本草云主溫中逐寒濕痹強陰益精通九竅止小便入足少陰厥陰聖濟經云滑則氣脫澀劑所以收之山茱萸之澀以收其滑仲景八味丸用為君主如何澀劑以通九竅雷公云用之去核一斤取肉四兩緩火熬用能壯元氣祕精核能滑精故去之珍云溫肝本經云止小便利以其味酸也觀八味丸用為君主其性味可知矣藥性論亦云補腎添精日華子亦云暖腰膝助水臟也益智氣熱味大辛辛溫無毒主君相二火手足太陰經足少陰經本是脾經藥象云治脾胃中受寒邪和中益氣治多唾當於補中藥內兼用之勿多服去皮用本草云主遺精虛漏小便遺瀝益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎之入鹽同煎服有神效液云主君相二火手足太陰足少陰本是脾藥在集香丸則入肺在四君子湯則入脾在大鳳髓丹則入腎脾肺腎互有子母相關厚朴氣溫味辛陽中之陰苦而辛無毒象云能治腹脹若虛弱雖腹脹宜斟酌用之寒脹是大熱藥中兼用結者散之神藥誤用脫人元氣切禁之紫色者佳去皮薑汁製微炒珍云去腹脹厚腸胃心云味厚陰也專去腹脹滿去邪氣本草云主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃本經云治中風傷寒頭痛溫中益氣消痰下氣厚腸胃去腹脹滿果泄氣乎果益氣乎若與枳實大黃同用則能泄實滿本經謂消痰下氣者是也若與橘皮蒼朮同用則能除濕滿本經謂溫中益氣者是也與解利藥同用則治傷寒頭痛與痢藥同用則厚腸胃大抵苦溫用苦則泄用溫則補衍義云平胃散中用之最調中至今盛行既能溫脾胃又能走冷氣海藏云加減隨證如五積散治療同本草又云乾薑為使惡澤瀉寒水石硝石丁香氣溫味辛純陽無毒入手太陰經足陽明經少陰經象云溫脾胃止霍亂消痃癖氣脹反胃腹內冷痛壯陽暖腰膝殺酒毒珍云去胃中之寒本草云主溫脾胃止霍亂壅脹風毒諸腫牙齒疳䘌能發諸香能療反胃腎氣奔豚氣陰痛壯陽暖腰膝消痃癖除冷勞液云與五味子廣朮同用亦治奔豚之氣能泄肺能補胃大能療腎沉香氣微溫陽也本草云治風水毒腫去惡氣能調中壯陽暖腰膝破症癖冷風麻痹骨節不任濕風皮膚癢心腹痛氣痢止轉筋吐瀉東垣云能養諸氣上而至天下而至泉用為使最相宜珍云補右命門乳香苦陽珍云定諸經之痛藿香氣微溫味甘辛陽也甘苦純陽無毒入手足太陰經象云治風水去惡氣治脾胃吐逆霍亂心痛去枝梗用葉心云芳馨之氣助脾開胃止嘔珍云補衛氣益胃進食本草云主脾胃嘔逆療風水毒腫去惡氣療霍亂心痛溫中快氣治口臭上焦壅煎湯漱口入手足太陰入順氣烏藥湯則補肺入黃耆四君子湯則補脾檀香氣溫味辛熱無毒入手太陰經足少陰經通行陽明經藥本草云主心腹痛霍亂中惡鬼氣殺蟲又云治腎氣諸痛腹痛消熱腫東垣云能調氣而清香引芳香之物上行至極高之分最宜橙橘之屬佐以薑棗將以葛根豆蔻縮砂益智通行陽明之經在胸膈之上處咽嗌之中同為理氣之藥珍云主心腹霍亂中惡引胃氣上升進食蘇合香味甘溫無毒本草云主辟惡殺鬼精物溫瘧蠱毒癇痓去三蟲除邪令人無夢魘久服通神明輕身長年生中臺川穀禹錫云按梁書云中天竺國出蘇合香是諸香汁煎之非自然一物也檳榔氣溫味辛苦味厚氣輕陰中陽也純陽無毒象云治後重如神性如鐵石之沉重能墜諸藥至於下極杵細用心云苦以破滯辛以散邪專破滯氣下行珍云破滯氣泄胸中至高之氣本草云主消穀逐水除痰癖下三蟲去伏尸療寸白蟲梔子氣寒味微苦味苦性大寒味薄陰中陽也無毒入手太陰經象云治心煩懊憹而不得眠心神顛倒欲絶血滯小便不利杵細用心云去心中客熱除煩躁與豉同用珍云止渴去心懊憹煩躁本草云主五內邪氣胃中熱氣面赤酒疱渣鼻白癩赤癩瘡瘍療目熱赤痛胸心大小腸大熱心中煩悶胃中熱氣仲景用梔子治煩胸為至高之分也故易老云輕浮而象肺也色赤而象火故能瀉肺中之火本草不言吐仲景用此為吐藥梔子本非吐藥為邪氣在上拒而不納故令上吐邪因得以出經曰其高者因而越之此之謂也或用梔子利小便實非利小便清肺也肺氣清而化膀胱為津液之府小便得此氣化而出也本經謂治大小腸熱辛與庚合又與丙合又能泄戊其先入中州故也入手太陰梔子豉湯治煩躁煩者氣也躁者血也氣主肺血主腎故用梔子以治肺煩用香豉以治腎躁躁者懊憹不得眠也少氣虛滿者加甘草若噦嘔者加生薑橘皮下後腹滿而煩梔子厚朴枳實湯下後身熱微煩梔子甘草乾薑湯梔子大而長者染色不堪入藥皮薄而圓七稜至九稜者名山梔子所謂越桃者是也衍義云仲景治傷寒發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹以梔子豉湯治虛煩故不用大黃以有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液臟腑無潤養內生虛熱非此不可除又治心經留熱小便赤澀去皮山梔子火煨大黃連翹甘草炙等分末之水煎三錢匕服之者無不效仲景傷寒論及古今諸名醫治發黃皆用梔子茵陳香豉甘草四物等分作湯飲之又治大病起勞復皆用梔子鼠矢等湯並利小便而愈其方極多不可悉載用仁去心胸中熱用皮去肌表熱黃柏氣寒味苦苦厚微辛陰中之陽降也無毒足太陽經引經藥足少陰經之劑象云治腎水膀胱不足諸痿厥腳膝無力於黃耆湯中少加用之使兩膝中氣力湧出痿即去矣蜜炒此一味為細末治口瘡如神癱瘓必用之藥珍云瀉膀胱之熱利下竅心云太陽經引經藥瀉膀胱經火補本經及腎不足苦寒安蛔療下焦虛堅腎經曰苦以堅之本草云主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神液云足少陰劑腎苦燥故腎停濕也梔子黃芩入肺黃連入心黃柏入腎燥濕所歸各從其類也活人書解毒湯上下內外通治之惡乾漆枳實氣寒味苦酸咸純陽無毒象云除寒熱破結實消痰癖治心下痞逆氣脅痛麩炒用心云潔古用去脾經積血故能去心下痞脾無積血則心下不痞治心下痞散氣消宿食苦寒炙用破水積以泄里除氣珍云去胃中濕本草云主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目生河內川澤商州者佳益氣則佐之以人參乾薑白朮破氣則佐之以大黃牽牛芒硝此本經所以言益氣而復言消痞也非白朮不能去濕非枳實不能除痞殼主高而實主下高者主氣下者主血主氣者在胸膈主血者在心腹仲景治心下堅大如盤水飲所作枳實白朮湯主之枳實七枚術三兩水一斗煎取三升分三服腹中軟即消衍義云枳實枳殼一物也小即性酷而速大則性詳而緩故仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之意他方但導敗風壅之氣可常用者故用枳殼故胸中痞有桔梗枳殼湯心下痞有枳實白朮湯高低之分易老詳定為的也枳殼氣寒味苦苦而酸微寒味薄氣厚陽也陰中微陽無毒象云治脾胃痞塞泄肺氣麩炒用心云利胸中氣勝濕化痰勿多用損胸中至高之氣珍云破氣本草云主風癢麻痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛藥性論云枳殼使味苦辛治遍身風疹肌中如麻豆惡癢殼高主皮毛胸膈之病實低主心胃之病其主治大同小異牡丹皮氣寒味苦辛陰中微陽辛苦微寒無毒手厥陰經足少陰經象云治腸胃積血及衄血吐血必用之藥珍云涼骨蒸本草云主寒熱中風瘛瘲痙驚癇邪氣除症堅瘀血留舍腸胃安五臟療癰瘡除時氣頭痛客熱五勞之氣腰痛風噤癲疾易老云治神志不足神不足者手少陰志不足者足少陰故仲景八味丸用之牡丹乃天地之精群花之首葉為陽發生花為陰成實丹為赤即火故能瀉陰中之火牡丹皮手厥陰足少陰治無汗骨蒸地骨皮足少陰手少陽治有汗骨蒸也地骨皮氣寒味苦陰也大寒無毒足少陰經手少陽經象云解骨蒸肌熱主風濕痹消渴堅筋骨去骨用根皮心云去肌熱及骨中之熱珍云涼血涼骨本草云主五內邪氣熱中消渴周痹風濕下胸脅氣客熱頭痛補內傷大勞噓吸堅筋骨強陰利大小腸藥性論云根皮細銼面拌熟煮吞之主腎家風益精氣衍義云枸杞當用梗皮地骨當用根皮枸杞子當用其紅實實微寒皮寒根大寒豬苓氣平味甘苦甘寒甘苦而淡甘重於苦陽也無毒入足太陽經少陰經象云除濕比諸淡滲藥大燥亡津液無濕證勿服去皮用心云苦以泄滯甘以助陽淡以利竅故能除濕利小便珍云利小便本草云主痎瘧解毒蠱疰不祥利水道能療妊娠淋又治從腳上至腹腫小便不利仲景少陰渴者豬苓湯入足太陽少陰衍義云行水之功多久服必損腎氣昏人目果欲久服者更宜詳審茯苓氣平味淡味甘而淡陽也無毒白者入手太陰經足太陽經少陽經赤者入足太陰經手太陽經少陰經象云止渴利小便除濕益燥和中益氣利腰臍間血為主治小便不通溺黃而赤或不利如小便利或數服之則大損人目如汗多人服之損真氣夭人壽醫云赤瀉白補上古無此說去皮用心云淡能利竅甘以助陽除濕之聖藥也味甘平補陽益脾逐水濕淫所勝小便不利淡味滲泄陽也治水緩脾生精導氣珍云甘純陽滲泄止渴本草云胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便止消渴好唾大腹淋瀝消膈中痰水水腫淋結開胸腑調臟氣伐腎邪長陰益氣力保神守中液云入足少陰手足太陽色白者入辛壬癸赤者入丙丁伐腎邪小便多能止之小便澀能利之與車前子相似雖利小便而不走氣酒浸與光明硃砂同用能祕真味甘平如何是利小便茯神陽也味甘無毒珍云治風眩心虛非此不能安藥性論云君主驚癇安神定志補虛乏主心下急痛堅滿人虛而小便不利者烏藥氣溫味辛無毒入足陽明經少陰經本草云主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲又云去貓涎極妙烏藥葉及根嫩時採作茶片炙碾煎服能補中益氣偏止小便滑數乾漆氣溫平味辛無毒有毒本草云主絶傷補中續筋骨填髓腦安五臟治五緩六急風寒濕痹療咳嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲生漆去長蟲半夏為之使畏雞子忌油脂皂莢氣溫味辛咸有小毒引入厥陰經藥本草云主風痹死肌邪氣風頭淚出利九竅療腹脹滿消穀除咳嗽治囊縮婦人胞不落明目益精可為沐藥不入湯日華子云通關節除頭風消痰殺勞蟲治骨蒸開胃破堅瘕腹中痛能墮胎柏實為之使惡麥門冬畏空青人參苦參仲景治咳逆上氣唾濁但坐不得臥皂莢丸主之杵末一物蜜丸桐子大用棗湯服一丸日三夜一活人書云治陰毒正陽散內用皂莢引入厥陰也用之有蜜炙酥炙燒灰之異等分依方竹葉氣平味辛又苦大寒辛平無毒本草云主咳逆上氣溢筋急惡瘍殺小蟲除煩熱風痙喉痹嘔吐仲景竹葉湯用淡竹葉心云除煩熱緩皮而益氣珍云陰中微陽涼心經竹茹氣微寒味苦本草云主嘔噦溫氣寒熱吐血崩中溢筋淡竹葉氣寒味辛平本草云主胸中痰熱咳逆上氣藥性論云淡竹葉主吐血熱毒風壓丹石藥毒止渴日華子云淡竹及根消痰治熱狂煩悶中風失音不語壯熱頭痛頭風並懷孕婦人頭旋倒地止驚悸溫疫迷悶小兒驚癇天吊莖葉同用見局方本草今録附於此茗苦茶氣微寒味苦甘無毒入手足厥陰經液云臘茶是也清頭目利小便消熱渴下氣消食令人少睡中風昏憒多睡不醒宜用此入手足厥陰茗苦茶苦甘微寒無毒主瘻瘡利小便去痰熱渴治陰證湯藥內用此去格拒之寒及治伏陽大意相似茶苦經云苦以泄之其體下行如何是清頭目秦皮氣寒味苦無毒液云主熱利下重下焦虛經云以苦堅之故用白頭翁黃柏秦皮苦之劑也治風寒濕痹目中青翳白膜男子少精婦人帶下小兒驚癇宜作湯洗目俗呼為白樳木取皮漬水浸出青藍色與紫草同用以增光暈尤佳大戟為之使惡吳茱萸桑白皮氣寒味苦酸甘而辛甘厚辛薄無毒入手太陰經象云主傷中五勞羸瘦補虛益氣除肺氣止唾血熱渴消水腫利水道心云甘以固元氣辛以瀉肺氣之有餘本草云治傷中五勞六極羸瘦崩中脈絶補虛益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可縫金瘡出土者殺人續斷麻子桂心為之使忌鐵鉛梓白皮氣寒味苦無毒本草云主熱去三蟲治目中疾生河內山谷今近道皆有之木似梧桐紫葳即凌霄花氣微寒味酸無毒本草云主婦人産乳余疾崩中癥瘕血閉寒熱羸瘦養胎莖葉味苦無毒主痿蹶益氣日華子云根治熱風身癢遊風風疹治瘀血帶下花葉功用同又云凌霄花治酒齄熱毒風刺婦人血膈遊風崩中帶下衍義云木也紫葳花是也畏滷咸訶黎勒氣溫味苦苦而酸性平味厚陰也降也苦重酸輕無毒象云主腹脹滿不下飲食消痰下氣通利津液破胸膈結氣治久痢赤白腸風去核搗細用心云經曰肺苦氣上逆急食苦以泄之以酸補之苦重瀉氣酸輕不能補肺故嗽藥中不用俗名訶子隨風子本草云主冷氣心腹滿下食仲景治氣痢以訶黎勒十枚麵裹煻灰火中煨之令面黃熟去核細研為末和粥飲頓服衍義云氣虛人亦宜緩緩煨熟少服此物能澀腸而又泄氣蓋其味苦澀故爾其子未熟時風飄墮者謂之隨風子杜仲味辛甘平溫無毒陽也降也本草云主腰脊痛補中益精氣堅筋骨強志除陰下濕癢小便餘瀝腳中痠疼不欲踐地久服輕身耐老惡蛇蛻皮玄參日華子云暖治腎勞腰脊攣入藥炙用琥珀氣平味甘陽也珍云利小便清肺本草云安五臟定魂魄消瘀血通五淋杵細用藥性論云君治産後血疹痛日華子云療蠱毒壯心明目磨翳止心痛癲邪破癥結郁李仁味苦辛陰中之陽辛苦陰也珍云破血潤燥本草云郁李根主齒齦腫齲齒堅齒去毒蟲藥性論云根治齒痛宣結氣破積聚日華子云根涼無毒治小兒發熱作湯浴風蚛牙濃煎含之巴豆氣溫味辛生溫熟寒有大毒本草云主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩滌五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚療女子月閉爛胎金瘡膿血不利丈夫陰㿗殺斑蝥毒健脾開胃易老云斬關奪門之將大宜詳悉不可輕用雷公云得火則良若急治為水穀道路之劑去皮心膜油生用若緩治為消堅磨積之劑炒煙去令紫黑研用可以通腸可以止泄世所不知也仲景治百病客忤備急圓主之巴豆杏仁例及加減寒熱佐使五色並余例並見元戎珍云去胃中寒濕芫花氣溫味辛苦有小毒本草云主咳逆上氣喉鳴喘急咽腫短氣蠱毒鬼瘧癰腫疝瘕殺蟲魚消胸中痰水喜聲去唾水腫五水在五臟皮膚及腰痛下寒毒肉毒久服令人虛仲景治太陽中風脅下痛嘔逆者可攻十棗湯主之液云胡洽治痰癖飲加以大黃甘草五物同煎以相反主之欲其大吐也治之大略水者肺腎胃三經所主有五臟六腑十二經之部分上而頭中而四肢下而腰臍外而皮毛中而肌肉內而筋骨脈有尺寸之殊浮沉之異不可輕瀉當知病在何經何臟誤用則害深然大意泄濕內云五物者即甘遂大戟芫花大黃甘草也蘇木氣平味甘咸甘而酸辛性平甘勝於酸辛陽中之陰無毒本草云主破血産後血脹悶欲死者排膿止痛消癰腫瘀血婦人月水不調及血暈口噤心云性平甘勝於酸辛去風與防風同用珍云破死血川楝子氣寒味苦平有小毒本草云治傷寒大熱煩躁殺三蟲疥瘍利小便杵細用珍云入心主上下部腹痛金鈴子酸苦陰中之陽珍云心暴痛非此不能除即川楝子也沒藥味苦平無毒本草云主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤生波斯國似安息香其塊大小不定黑色梧桐淚味鹹珍云瘰癧非此不能除本草云味鹹苦大寒無毒主大毒熱心腹煩滿水和服之取吐又主牛馬急黃黑汗水研三二兩灌之立瘥日華子云治風蚛牙齒痛殺火毒並面毒海藥云主風疳䘌齒牙疼痛骨槽風勞能軟一切物多服令人吐也又為金銀焊藥桑東南根時習云根暖無毒研汁治小兒天吊驚癇客忤及敷鵝口瘡大效果部大棗氣溫味甘氣厚陽也無毒珍云味甘補經不足以緩陰血液云主養脾氣補津液強志三年陳者核中仁主腹痛惡氣卒疰忤治心懸經云助十二經脈治心腹邪氣和百藥通九竅補不足氣生者多食令人腹脹注泄蒸熟食補腸胃肥中益氣中滿者勿食甘甘者令人中滿故大建中湯心下痞者減飴棗與甘草同例生棗味甘辛多食令人多寒熱羸瘦者不可食葉覆麻黃能令出汗生河東平澤殺烏頭毒陳皮氣溫味微苦辛而苦味厚陰也無毒象云能益氣加青皮減半去滯氣推陳致新若補脾胃不去白若調理胸中肺氣須去白心云導胸中滯氣除客氣有白朮則補脾胃無白朮則瀉脾胃然勿多用也珍云益氣利肺有甘草則補肺無甘草則瀉肺本草云主胸中痰熱逆氣利水穀下氣止嘔咳除膀胱留熱停水五淋利小便主脾不能消穀氣衝胸中吐逆霍亂止瀉去寸白蟲能除痰解酒毒海藏治酒毒葛根陳皮茯苓甘草生薑湯手太陰氣逆上而不下宜以此順之陳皮白檀為之使其芳香之氣清奇之味可以奪橙也青皮氣溫味辛苦而辛性寒氣厚陰也足厥陰經引經藥又入手少陽經象云主氣滯消食破積結膈氣去穰心云厥陰經引經藥也有滯氣則破滯氣無滯氣則損真氣液云主氣滯下食破積結及膈氣或云與陳皮一種青皮小而未成熟成熟而大者橘也色紅故名紅皮日久者佳故名陳皮如枳實枳殼一種實小而青未穰殼大而黃紫色已穰故殼高而治胸膈實低而治心下與陳皮治高青皮治低同意又云陳皮青皮二種枳實枳殼亦有二種桃仁氣溫味苦甘性平苦重於甘陰中陽也無毒入手足厥陰經象云治大便血結血祕血燥通潤大便七宣丸中專治血結破血以湯浸去皮尖研如泥用心云苦以泄滯血甘以生新血故凝血須用又去血中之熱本草云主瘀血血閉癥瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血通月水止痛破血入手足厥陰衍義云老人虛祕與柏子仁火麻仁松子仁等分同研熔白蠟和丸如桐子大以少黃丹湯下仲景治中焦畜血用之杏仁氣溫味甘苦冷利有小毒入手太陰經象云除肺燥治風燥在胸膈間麩炒去皮尖用心云散結潤燥散肺之風及熱是以風熱嗽者用之本草云咳逆上氣雷鳴喉痹下氣産乳金瘡寒心賁豚驚癇心下煩熱風氣往來時行頭痛解肌消心下急殺狗毒破氣入手太陰王朝奉治傷寒氣上喘沖逆者麻黃湯內加杏仁陳皮若氣不喘沖逆者減杏仁陳皮知其能瀉肺也東垣云杏仁下喘用治氣也桃仁療狂用治血也桃杏仁俱治大便祕當以氣血分之晝則難便行陽氣也夜則難便行陰血也大腸雖屬庚為白腸以晝夜言之氣血不可不分也年虛人大便燥祕不可過泄者脈浮在氣杏仁陳皮脈沉在血桃仁陳皮所以俱用陳皮者以其手陽明病與手太陰俱為表裡也賁門上主往來魄門下主收閉故王氏言肺與大腸為通道也烏梅氣平味酸酸溫陽也無毒象云主下氣除熱煩滿安心調中治痢止渴以鹽為白梅亦入除痰藥去核用心云收肺氣本草云主肢體痛偏枯不仁死肌去青黑痣惡疾止下痢好唾口乾去骨間熱又方治一切惡瘡肉出以烏梅燒為灰杵末敷上惡肉立盡仲景治吐蛔下利烏梅丸木瓜氣溫味酸入手足太陰經本草云治腳氣濕痹邪氣霍亂大吐下轉筋不止益肺而去濕和胃而滋脾衍義云木瓜得木之正故入筋以鉛白霜塗之則失酸味受金制也此物入肝故益筋與血病腰腎腳膝無力此物不可缺也東垣云氣脫則能收氣滯則能和雷公云調榮衛助穀氣是也甘李根白皮時習云根皮大寒主消渴止心煩氣逆奔豚仲景奔豚湯中用之
