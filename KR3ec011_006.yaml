body:
  text: 卷之六菜部荊芥穗氣溫味辛苦本草云辟邪毒利血脈通宣五臟不足氣能發汗除勞渴杵和醋封毒腫去枝梗手搓碎用治産後血暈如神動渴疾多食薰五臟神破結氣生薑氣溫味辛辛而甘微溫氣味俱輕陽也無毒象云傷寒頭痛鼻塞咳逆上氣止嘔吐治痰嗽生與干同治與半夏等分治心下急痛鎆細用心云能製半夏厚朴之毒發散風寒益元氣大棗同用辛溫與芍藥同用溫經散寒嘔家之聖藥也辛以散之嘔為氣不散也此藥能行陽而散氣珍云益脾胃散風寒久服去臭氣通神明孫真人云為嘔家之聖藥或問東垣曰生薑辛溫入肺如何是入胃口曰俗皆以心下為胃口者非也咽門之下受有形之物系胃之繫便為胃口與肺同處故入肺而開胃口也又問曰人云夜間勿食生薑食則令人閉氣何也曰生薑辛溫主開發夜則氣本收斂反食之開發其氣則違天道是以不宜食此以平人論之可也若有病則不然姜屑比之乾薑不熱比之生薑不潤以乾生薑代乾薑者以其不僭故也本草云秦椒為之使殺半夏莨菪毒惡黃芩黃連天鼠糞乾薑氣熱味大辛辛大熱味薄氣厚陽中之陽也辛溫無毒象云治沉寒痼冷腎中無陽脈氣欲絶黑附子為引用水煎二物名姜附湯亦治中焦有寒水洗慢火炮心云發散寒邪如多用則耗散元氣辛以散之是壯火食氣故也須以生甘草緩之辛熱散裡寒散陰寒肺寒與五味同用治嗽以勝寒蛔正氣虛者散寒與人參同補藥溫胃腹中寒其平以辛熱珍云寒淫所勝以辛散之經炮則味苦本草云主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下利寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良主胸滿溫脾燥胃所以理中其實主氣而泄脾易老云乾薑能補下焦去寒故四逆湯用之乾薑本味辛及見火候稍苦故止而不移所以能治裡寒非若附子行而不止也理中湯用此者以其四順也或云乾薑味辛熱人言補脾今言泄而不言補者何也東垣謂泄之一字非泄脾之正氣也是泄脾中寒濕之邪故以姜辛熱之劑燥之故曰泄脾也薄荷氣溫味辛苦辛涼無毒手太陰經厥陰經藥象云能發汗通骨節解勞乏與薤相宜新病瘥人勿多食令虛汗出不止去枝梗搓碎用心云上行之藥陳士良云能引諸藥入榮衛又主風氣壅並蔥白氣溫味辛無毒入手太陰經足陽明經液云以通上下之陽也活人書傷寒頭痛如破連須蔥白湯主之心云通陽氣辛而甘氣厚味薄陽也發散風邪本草云蔥實主明目補中不足其莖白平可作湯主傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痹不通安胎歸目除肝邪氣安中利五臟益目精殺百藥毒蔥根主傷寒頭痛蔥汁平溫主溺血解藜蘆毒韭白氣溫味辛微酸無毒本草云歸心安五臟除胃中熱利病人可久食子主夢泄精溺白根養髮陰物變為陽薤白氣溫味苦辛無毒入手陽明經本草云主金瘡瘡敗輕身不飢耐老除寒熱去水氣溫中散結利病人諸瘡中風寒水腫以此塗之下重者氣滯也四逆散加此以泄氣滯心云治泄痢下重下焦氣滯泄滯氣瓜蒂氣寒味苦有毒本草云治大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中者皆吐下之去鼻中息肉療黃疸鼻中出黃水除偏頭疼有神頭目有濕宜此瓜蒂苦以治胸中寒與白虎同例俱見知母條下與麝香細辛為使治久不聞香臭仲景鈐方瓜蒂一十四個丁香一個黍米四十九粒為末含水㗜一字取下冬葵子氣寒味甘無毒本草云主五臟六腑寒熱羸瘦五癃利小便療婦人乳難內閉久服堅筋骨長肌肉輕身衍義云性滑利不益人患癰癤毒熱內攻未出膿者水吞三五粒遂作竅膿出蜀葵花冷陰中之陽珍云赤者治赤帶白者治白帶赤治血燥白治氣燥香薷味辛微溫本草云主霍亂腹痛吐下散水腫炊單布液云仲景治墜馬及一切筋骨損方中用時習補入米穀部粳米氣微寒味甘苦甘平無毒入手太陰經少陰經液云主益氣止煩止渴止泄與熟雞頭相合作粥食之可以益精強志耳目聰明本草諸家共言益脾胃如何白虎湯用之入肺以其陽明為胃之經色為西方之白故入肺也然治陽明之經即在胃也色白味甘寒入手太陰又少陰證桃花湯用此甘以補正氣竹葉石膏湯用此甘以益不足衍義云平和五臟補益胃氣其功莫逮然稍生則復不益脾過熟則佳赤小豆氣溫味辛甘酸陰中之陽無毒本草云主下水排膿寒熱熱中消渴止泄利小便吐逆卒澼下脹滿又治水腫通健脾胃赤小豆食之行小便久食則虛人令人黑瘦枯燥赤小豆花治宿酒渴病即腐婢也花有腐氣故以名之與葛花末服方寸匕飲酒不知醉氣味平辛大豆黃卷是以生豆為糵待其芽出便曝乾用方書名黃卷皮産婦藥中用之性平黑大豆氣平味甘本草云塗癰腫煮汁飲殺鬼毒止痛解烏頭毒除胃中熱痹傷中淋露逐水脹下瘀血久服令人身重炒令黑煙未斷熱投酒中治風痹癰瘓口噤産後諸風食罷生服半掬去心胸煩熱明目鎮心不忘惡五參龍膽得前胡烏喙杏仁牡蠣良大麥糵氣溫味甘咸無毒象云補脾胃虛寬腸胃先杵細炒黃取面用本草云能消化宿食破癥結冷氣去心腹脹滿開胃止霍亂除煩去痰治産後祕結鼓脹不通大麥糵並神麯二藥氣虛人宜服以代戊己腐熟水穀與豆蔻縮砂木瓜芍藥五味子烏梅為之使小麥氣微寒味甘無毒本草云除熱止燥渴咽乾利小便養肝氣止漏血唾血青蒿散有小麥百粒治大人小兒骨蒸肌熱婦人勞熱神麯氣暖味甘入足陽明經象云消食治脾胃食不化須於脾胃藥中少加之微炒黃用珍云益胃氣本草云療臟腑中風氣調中下氣開胃消宿食主霍亂心膈氣痰逆除煩破癥結及補虛去冷氣除腸胃中塞不下食令人好顏色落胎下鬼胎又能治小兒腹堅大如盤胸中滿胎動不安或腰痛搶心下血不止火炒以助天五之氣入足陽明酒氣大熱味苦甘辛有毒本草云主行藥勢殺百邪惡毒氣能行諸經不止與附子相同味辛者能散味苦者能下味甘者居中而緩也為導引可以通行一身之表至極高之分若味淡者則利小便而速下大海或凝惟酒不冰三人晨行遇大寒一人食粥者病一人腹空者死一人飲酒者安則知其大熱也苦酒一名醋一名醯氣溫味酸無毒液云斂咽瘡主消癰腫散水氣殺邪毒余初録本草苦酒條本經一名醯又一名苦酒如為一物也及讀金匱治黃疸有麻黃醇酒湯右以美清酒五升煮二升苦酒也前治黃汗有黃耆芍藥桂枝苦酒湯飴即膠飴氣溫味甘無毒入足太陰經藥液云補虛乏止渴去血以其色紫凝如深琥珀色謂之膠飴色白而枯者非膠飴即餳糖也不入藥用中滿不宜用嘔家切忌為足太陰經藥仲景謂嘔家不可用建中湯以甘故也香豉氣寒味苦陰也無毒象云治傷寒頭痛煩躁滿悶生用珍云去心中懊憹本草云主傷寒頭痛寒熱傷寒初覺頭痛內熱脈洪起一二日便作此加減蔥豉湯蔥白一虎口豉一升綿裹以水三升煎取一升頓服取汗若不汗加葛根三兩水五升煮二升分二服又不汗加麻黃三兩去節玉石部石膏氣寒味甘辛微寒大寒無毒入手太陰經少陽經足陽明經象云治足陽明經中熱發熱惡熱燥熱日晡潮熱自汗小便濁赤大渴引飲肌肉壯熱苦頭痛之藥白虎湯是也善治本經頭痛若無此有餘證勿用心云細理白澤者良甘寒胃經大寒藥潤肺除熱發散陰邪緩脾益氣珍云辛甘陰中之陽止陽明經頭痛胃弱不可服下牙痛須用香白芷為引本草云主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中膈氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯太上云石膏發汗辛寒入手太陰也東垣云微寒足陽明也又治三焦皮膚大熱手少陽也仲景治傷寒陽明證身熱目痛鼻乾不得臥身已前胃之經也胸胃肺之室邪在陽明肺受火制故用辛寒以清肺所以號為白虎湯也雞子為之使惡莽草馬目毒公藥性論云石膏使惡巴豆唐本注療風去熱解肌滑石氣寒味甘大寒無毒入足太陽經象云治前陰不利性沉重能泄上氣令下行故曰滑則利竅不可與淡滲同用白者佳杵細水飛用本草云主身熱泄澼女子乳難癃閉利小便蕩腸胃積聚寒熱益精氣通九竅六腑津液去留結止渴令人利中入足太陽滑能利竅以通水道為至燥之劑豬苓湯用滑石與阿膠同為滑利以利水道蔥豉生薑同煎去渣澄清以解利淡味滲泄為陽解表利小便也若小便自利不宜以此解之衍義云暴吐逆不下食以生細末二錢匕溫水調服後以熱面壓之朴硝氣寒味苦辛象云除寒熱邪氣逐六腑積聚結痼留癖胃中食飲熱結去血閉停痰痞滿消毒揉細生用盆硝即芒硝氣寒味鹹心云去實熱經云熱淫於內治以鹹寒此之謂也珍云純陰熱淫於內治以鹹寒本草云主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈及月水破五淋消腫毒療天行熱病藥性論云使味鹹有小毒通月閉癥瘕下瘰癧黃疸主漆瘡散惡血聖惠方云治代指用芒硝煎湯淋漬之愈硝石氣寒味甘辛一作苦辛大寒無毒又云咸又云甜甜微緩於咸液云硝石者硝之總名也但不經火者謂之生硝朴硝經火者謂之盆硝芒硝古人用辛今人用鹹辛能潤燥咸能軟堅其意皆是老弱虛人可下者宜用若用此者以玄明粉代之尤佳本經謂利小便而墮胎傷寒妊娠可下者用此兼以大黃引之直入大腸潤燥軟堅瀉熱子母俱安內經云有故無殞亦無殞也此之謂歟以在下言之則便溺俱陰以前後言之則前氣後血以腎言之總主大小便難溺澀祕結俱為水少經云熱淫於內治以鹹寒佐以苦故以芒硝大黃相須為使也玄明粉氣冷味辛甘無毒液云治心熱煩躁五臟宿滯癥瘕明目逐膈上虛熱消腫毒注中有治陰毒一句非伏陽不可用若止用此除陰毒殺人甚速牙硝條下太清煉靈砂補注謂陰極之精能化火石之毒仙經云陰中有陽之物硫黃氣溫大熱味酸有毒本草云主婦人陰蝕疽痔惡血堅筋骨除頭禿療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部䘌瘡止血殺疥蟲液云如太白丹佐以硝石來復丹用硝石之類至陽佐以至陰與仲景白通湯佐以人溺豬膽汁大意相同所以去格拒之寒兼有伏陽不得不爾如無伏陽只是陰證更不必以陰藥佐之也硫黃亦號將軍功能破邪歸正返滯還清挺出陽精消陰化魄生魂雄黃氣溫寒味苦甘有毒本草云主寒熱鼠瘻惡瘡疽痔死肌療疥蟲䘌瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰赤石脂氣大溫味甘酸辛無毒本草主養心氣明目益精療腹痛泄澼下利赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益老不飢輕身延年五色石脂各入五臟補益東垣云赤石脂白石脂並溫無毒畏黃芩芫花惡大黃本經云澀可去脫石脂為收斂之劑胞衣不出澀劑可以下之赤入丙白入庚珍云赤白石脂俱甘酸陽中之陰固脫心云甘溫篩末用去脫澀以固腸胃局方本草云青石脂養肝膽氣明目黑石脂養腎氣強陰主陰蝕瘡黃石脂養脾氣除黃疸余與赤白同功禹餘糧氣寒味甘無毒本草云主咳逆寒熱煩滿下痢赤白血閉癥瘕大熱本經云重可去怯禹餘糧之重為鎮固之劑本草注云仲景治傷寒下痢不止心下痞硬利在下焦者赤石脂禹餘糧湯主之赤石脂禹餘糧各一斤並碎之以水六升煎取二升去渣分二服雷公云看如石輕敲便碎可如粉也兼重重如葉子雌黃此能益脾安五臟代赭石氣寒味甘苦無毒一名須丸出姑幕者為須丸出代郡者名代赭入手少陰經足厥陰經本草云主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下帶下百病産難胞衣不出墮胎養血除五臟血脈中熱血痹血瘀大人小兒驚氣入腹及陰痿不起聖濟經云怯則氣浮重則所以鎮之怯者亦驚也鉛丹氣微寒味辛黃丹也本草云主吐逆反胃驚癇癲疾除熱下氣止小便利除毒熱筋攣金瘡溢血又云鎮心安神止吐血本經云澀可去脫而固氣成無己云鉛丹收斂神氣以鎮驚也藥性論云君治消渴煎膏止痛生肌白粉本草云一名胡粉一名定粉一名瓦粉仲景豬膚湯用白粉非此白粉即白米粉也黃延非治胸中寒是治胸中塞誤寫作寒字藥性論云胡粉使又名定粉味甘辛無毒能治積聚不消焦炒止小兒疳痢陳藏器云主久痢成疳粉和水及雞子白服以糞黑為度為其殺蟲而止痢也紫石英氣溫味甘辛無毒入手少陰經足厥陰經本草云主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤久服溫中輕身延年得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂長石為之使畏扁青附子不欲鮀甲黃連麥句姜衍義云仲景治風熱瘛瘲風引湯紫石英白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石等分上㕮咀以水一升煎去三分食後量多少溫呷之不用渣立效伏龍肝氣溫味辛時習云主婦人崩中吐血止咳逆止血消癰腫衍義云婦人惡露不止蠶沙一兩炒伏龍肝半兩阿膠一兩同為末溫酒調空心服三二錢以止為度藥性論云單用亦可咸無毒日華子云熱微毒治鼻洪腸風帶下血崩泄精尿血催生下胞及小兒夜啼一云治心痛及中風心煩陶隱居云此灶中對釜月下黃土也白礬氣寒味酸無毒本草云主寒熱泄瀉下痢白沃陰蝕惡瘡消痰止渴除痼熱治咽喉閉目痛堅骨齒藥性論云使有小毒生含咽津治急喉痹硃砂味甘珍云心熱者非此不能除局方本草云丹朱味甘微寒無毒養精神安魂魄益氣明目通血脈止煩渴藥性論云君有大毒鎮心主抽風日華子云涼微毒潤心肺惡磁石畏鹹水硇砂味鹹本草云破堅癖獨不用入群隊用之味鹹苦辛溫有毒不宜多服主積聚破結血爛胎止痛下氣療咳嗽宿冷去惡肉生好肌柔金銀可為焊藥藥性論云有大毒畏漿水忌羊血味酸鹹能腐壞人腸胃生食之化人心為血能除冷病大益陽事日華子云北庭砂味辛酸暖無毒畏一切酸補水臟暖子宮消冷癖瘀血宿食氣塊痃癖及婦人血氣心痛血崩帶下凡修制用黃丹石灰作匱煅赤使用無毒柔金銀驢馬藥亦用東流水味平無毒時習云千里水及東流水主病後虛弱揚之萬過煮藥收禁神效二者皆堪蕩滌邪穢此水潔淨誠與諸水不同為雲母所畏煉雲母粉用之甘瀾水時習云揚之水上成珠者是也治霍亂及入膀胱治奔豚藥用之殊勝禽部雞子黃氣溫味甘本草云陰不足補之以血若咽有瘡雞子一枚去黃苦酒傾殼中以半夏入苦酒中取殼置刀環上熬微沸去渣旋旋呷之又主除熱火瘡癇痙可作琥珀神物黃和恆山末為丸竹葉湯服治久瘧不差黃合鬚髮煎消為水療小兒驚熱下痢獸部龍骨氣平微寒味甘陽也無毒本草云主心腹鬼疰精物老魅咳逆泄利膿血女子漏下癥瘕堅結小兒熱氣驚癇療心腹煩滿四肢痿枯汗出夜臥自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗縮小便溺血養精神定魂魄安五臟本經云澀可去脫而固氣成無己云龍骨牡蠣鉛丹皆收斂神氣以鎮驚凡用燒通赤為粉畏石膏珍云固大腸脫麝香氣溫味辛無毒本草云主辟惡氣殺鬼精物療溫瘧蠱毒癇痙去三尸蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎牛黃氣平味苦有小毒本草云主驚癇寒熱熱盛狂痙逐鬼除邪療小兒百病諸癇熱口噤不開大人癲狂又墮胎久服令人不忘又云磨指甲上黃者為真又云定魂魄人參為使得牡丹菖蒲利耳目惡龍骨龍膽地黃畏牛漆犀角氣寒味苦酸咸微寒無毒象云治傷寒溫疫頭痛安心神止煩亂明目鎮驚治中風失音小兒麩豆風熱驚癇鎊用本草云主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐療傷寒溫疫頭痛寒熱諸毒氣能治一切瘡腫破血液云升麻代犀角說並見升麻條下易老療畜血分三部上焦畜血犀角地黃湯中焦畜血桃仁承氣湯下焦畜血抵當湯丸丸但緩於湯耳三法的當後之用者無以復加阿膠氣微溫味甘平無毒甘平味薄氣升陽也入手太陰經足少陰經厥陰經象云主心腹痛內崩補虛安胎堅筋骨和血脈益氣止痢炮用心云補肺金氣不足除不足甘溫補血出東阿得火良本草云主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠痛女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳痛不能久立養肝氣益肺氣肺虛極損咳嗽唾膿血非阿膠不補仲景豬苓湯用阿膠滑以利水道活人書四物湯加減例妊娠下血者加阿膠豬膚氣寒味甘入足少陰經液云豬皮味甘寒豬水畜也其氣先入腎解少陰客熱是以豬膚解之加白蜜以潤燥除煩白粉以益氣斷痢豬膽汁氣寒味苦咸苦寒液云仲景白通湯加此汁與人尿鹹寒同與熱劑合去格拒之寒又與醋相合內穀道中酸苦益陰以潤燥瀉便本經云治傷寒熱渴又白豬蹄可用雜青色者不可食療疾亦不可心云與人尿同體補肝而和陰引置陽不被格拒能入心而通脈獺肝味甘有毒本草云主鬼疰蠱毒卻魚鯁止久嗽燒灰服之豭鼠糞治傷寒勞復經言牡鼠糞兩頭尖者是或在人家諸物中遺者人尿時習云療寒熱頭疼溫氣童男子者尤良衍義云人尿須用童男者産後溫一杯壓下敗血惡物久服令人反虛氣血無熱尤不可多服此亦性寒故治熱勞方中亦用也日華子云小便涼止勞渴嗽潤心肺療血悶熱狂撲損瘀血運絶及蛇犬等咬以熱尿淋患處難産胞衣不下即取一升用薑蔥煎乘熱飲即下蟲部牡蠣氣微寒味鹹平無毒入足少陰經象云治傷寒寒熱溫瘧女子帶下赤白止汗止心痛氣結澀大小腸治心脅痞燒白研細用珍云能軟積氣之痞經曰咸能軟堅心云咸平熬泄水氣本草云主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節榮衛虛熱往來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱能去瘰癧一切瘡腫入足少陰咸為軟堅之劑以柴胡引之故能去脅下之硬以茶引之能消結核以大黃引之能除股間腫地黃為之使能益精收澀止小便本腎經之藥也久服強骨節殺鬼延年貝母為之使得甘草牛膝遠志蛇床子良惡麻黃吳茱萸辛夷藥性論云君主之劑治女子崩中止血及盜汗除風熱定痛治溫瘧又和杜仲服止盜汗為末蜜丸服三十丸令人面光白永不值時氣又治鬼交精出病人虛而多熱加用之並地黃小草陳士良云牡蠣搗粉粉身治大人小兒盜汗和麻黃根蛇床子乾薑為粉粉身去陰汗衍義意同文蛤氣平味鹹無毒本草云主惡瘡蝕五痔咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下能利水治急疳蝕口鼻數日盡欲死燒灰臘豬脂和塗之墜痰軟堅止渴收澀固濟蛤粉也咸能走腎可以勝水文蛤尖而有紫斑虻蟲氣微寒味苦平有毒本草云主目中赤痛眥傷淚出瘀血血閉寒熱酸𢠹無子炒去翅足水蛭氣微寒味鹹苦平有毒本草云主逐惡血瘀血月閉破血瘕積聚無子利水道墮胎炒用畏鹽苦走血咸勝血仲景抵當湯用虻蟲水蛭鹹苦以泄畜血故經云有故無殞也雖可用之亦不甚安莫若四物湯加酒浸大黃各半下之極妙䗪蟲味鹹寒有毒本草云主心腹寒熱灑灑血積癥瘕破堅下血閉生子大良仲景主治久瘕積結有大黃䗪蟲丸衍義云乳汁不行研一枚水半合濾清汁服勿令服藥人知之鼠婦氣溫微寒味酸無毒本草云主氣癃不得小便婦人月水閉血瘕癇痙寒熱利水道仲景治久瘧大鱉甲丸中使之以其主寒熱也衍義云鼠婦濕生蟲也蜘蛛微寒本草云主大人小兒㿗疝七月七日取其網療喜忘仲景治雜病狐疝偏有大小時時上下者蜘蛛一十四個熬焦桂半兩研細為散八分匕酒調服日再蜜丸亦通蠐螬微寒微溫味鹹有毒本草云主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜吐血在胸中不去及破骨踒折血結金瘡血塞産後中寒下乳汁仲景治雜病方大黃䗪蟲丸中用之以其主脅下堅滿也續傳信方治喉痹取蟲汁點在喉中下即喉開也時習補入蜜氣平微溫味甘無毒本草云主心腹邪氣諸驚癇痙安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩飲食不下止腸澼肌中疼痛口瘡明耳目液云凡煉蜜必須用火熬開以紙覆經宿紙上去蠟盡再熬色變不可過度令熟入藥蜣螂氣寒味酸有毒本草云治小兒驚風瘛瘲腹脹寒熱大人癲疾狂易手足端寒支滿奔豚日華子云墮胎治疰忤和乾薑傅惡瘡出箭頭圖經云心主疔瘡衍義云大小二種一種大者為胡蜣螂身黑光腹翼下有小黃子附母飛行晝不出夜方飛至人家戶庭中見燈光則來一種小者身黑暗晝方飛出夜不出今當用胡蜣螂以其小者研三十枚以水灌牛馬腸結佳鱉甲氣平味鹹無毒本草云主心腹癥瘕堅積寒熱去鼻中息肉陰蝕痔惡肉療溫瘧血瘕腰痛小兒脅下堅衍義云治勞瘦除骨中熱極佳蛇蛻心云去翳膜用之取其意也日華子云止嘔逆小兒驚悸客忤催生癧瘍白癜風煎汁敷入藥炙用蟬蛻心云治同蛇蛻藥性論云使治小兒渾身壯熱驚癇兼能止渴又云其蛻殼頭上有一角如冠狀謂之蟬花最佳味甘寒無毒主小兒天吊驚癇瘛瘲夜啼心悸白殭蠶味鹹辛平無毒本草云主小兒驚癇夜啼去三蟲滅黑䵟令人面色好男子陰瘍病女子崩中赤白産後余痛滅諸瘡瘢痕生潁川平澤四月取自死者勿令中濕濕有毒不可用斑蝥味辛寒有毒本草云主寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎畏巴豆烏蛇本草云主諸風瘙癮疹疥癬皮膚不仁頑痹諸風用之炙入丸散浸酒合膏背有三稜色黑如漆性善不噬物江東有黑稍蛇能纏物至死亦是其類生商洛山五靈脂味甘溫無毒本草云主療心腹冷氣小兒五疳闢疫治腸風通利氣脈女子月閉出北地此是寒號蟲糞也緋帛液云主惡瘡疔腫毒腫諸瘡有根者作膏用帛如手大取露蜂房彎頭棘刺爛草節二寸許亂髮燒末主疔瘡腫又主小兒初生臍未落時腫痛水出燒為末細研敷之又五色帛主盜汗拭乾訖棄五道頭仲景治墜馬及一切筋骨損方中用
