front:
  text: 湯液本草序一世皆知素問為醫之祖而不知軒岐之書實出於神農本草也殷伊尹用本草為湯液漢仲景廣湯液為大法此醫家之正學雖後世之明哲有作皆不越此豫集是書復以本草正條各從三陰三陽十二經為例仍以主病者為元首臣佐使應次之不必如編類者先玉石次草木次蟲魚以上中下三品為門也如太陽經當用桂枝湯麻黃湯必以麻黃桂枝為主本方中余藥後附之如陽明經當用白虎湯必以石膏為主本方中余藥後附之如少陽經當用三禁湯必以柴胡為主本方中余藥後附之如太陰少陰厥陰之經所用熱藥皆仿諸此至於金匱祖方湯液外定為常制凡可用者皆雜附之或以傷寒之劑改治雜病或以權宜之料更療常疾以湯為散以散為丸變易百端增一二味別作他名減一二味另為殊法醫壘元戎陰證略例癍論萃英錢氏補遺等書安樂之法湯液本草統之其源出於潔古老人珍珠囊也其間議論出新意於法度之中注奇辭於理趣之外見聞一得久弊全更不特藥品之咸精抑亦疾病之不誤夭橫不至壽域可期其湯液本草歟湯液本草序二神農嘗百草立九候以正陰陽之變化以救性命之昏札以為萬世法既簡且要殷之伊尹宗之倍於神農得立法之要則不害為湯液漢張仲景廣之又倍於伊尹得立法之要則不害為確論金域潔古老人派之又倍於仲景而亦得盡法之要則不害為奇注潔古倍於仲景無以異仲景之倍於伊尹仲景之倍於伊尹無以異伊尹之倍於神農也噫宗之廣之派之雖多寡之不同其所以得立法之要則一也觀潔古之説則知仲景之言觀仲景之言則知伊尹之意皆不出於神農矣所以先本草次湯液次傷寒論次保命書缺一不可矣成無己明理方例云自古諸方歷歲浸遠難可考憑仲景方最為衆方之祖是仲景本伊尹之法伊尹本神農之方醫帙之中特為縝細參合古法不越毫末實大聖之所作也文潞公藥準云惟仲景為群方之祖也昔唐宋以來得醫之名者如王叔和葛洪孫思邈範汪胡洽朱奉議王朝奉錢仲陽成無己陳無擇輩其議論方定增減變易千狀萬態無有一毫不出於仲景者金域百有餘載有潔古老人張元素遇至人傳祖方不傳之妙法嗣是其子云岐子張璧東垣先生李杲明之皆祖長沙張仲景湯液惜乎世莫能有知者豫受業於東垣老人故敢以題湯液本草後序劉禹錫云神農本經以朱書名醫別録以墨書傳寫既久朱墨錯亂遂令後人以為非神農書以此故也至於素問本經議者以為戰國時書加以補亡數篇則顯然非太素中語宜其以為非軒岐書也陳無擇云王叔和脈訣即高陽生剽竊是亦後人增益者雜之也何以知其然豫觀劉元賓注本雜病生死歌后比之他本即少八句觀此八句不甚滑溜與上文書意重疊後人安得不疑與本草經朱書雜亂素問之補亡混淆何以異哉宜乎識者非之繼而紛紜不已也吾不知他時誰為是正如元賓與潔古詳究而明稱其中凡有所疑而不古者削去之或不復注而直書本文吾不知為意易曉不必云耶為非聖賢之語而辨之耶二者必居一於此又啓玄子注素問恐有未盡以朱書待明者改刪增益傳録者皆以墨書其中不無差誤如刺熱論注五十九刺首云王注豈啓玄子之自謂乎此一篇又可疑也兼與靈樞不同以此經比之素問八十九刺何者為的以此觀之若是差別勞而無益學者安所適從哉莫若以金匱考之仲景所不言者皆所不取則正知真見定矣盧君論血枯舉太素云此得之年少時大脫血而成又舉子死腹中穢物不消又舉犯月水入房精與積血相射入於任脈留於胞中古人謂之精積元豐中雄州陳邦濟收一方治積精及惡血淹留胞冷絶娠驗者甚多其意與內經相近烏賊魚骨本治漏下與經汁不斷䕡茹去淹留惡血古人用此皆本草法豫觀方注條云古人用此皆本草法一句何其知本哉以是知軒岐之學實出於神農也又知伊尹湯液不出於軒岐亦出於神農也皆之一字至甚深廣也豈獨烏賊斷汁之一法哉故知張伯祖之學皆出於湯液仲景師而廣之迄今湯液不絶矣晉唐宋以來號明醫者皆出於此至今大定間潔古老人張元素及子云岐於張璧東垣李杲明之三老者出想千百載之下無復有之也何以知其然蓋當時學者雖多莫若三老之實絶也
